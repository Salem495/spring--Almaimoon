<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Follow-Up System - Almaimoon</title>
<style>
  :root {
    --green: #2d6a4f; --green-light: #40916c; --green-pale: #d8f3dc;
    --brown: #6b4226; --gold: #e9c46a; --red: #d62828;
    --blue: #1d3557; --sky: #457b9d; --orange: #e07b39;
    --gray: #6c757d; --bg: #f4f7f4; --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.10); --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #222; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #2d6a4f 0%, #40916c 50%, #d8f3dc 100%);
  }
  .login-card {
    background: var(--white); border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    padding: 40px 36px; width: 380px; text-align: center;
  }
  .login-card .logo { font-size: 52px; margin-bottom: 8px; }
  .login-card h1 { color: var(--green); font-size: 22px; margin-bottom: 4px; }
  .login-card p { color: var(--gray); font-size: 13px; margin-bottom: 24px; }
  .login-card select, .login-card input {
    width: 100%; padding: 11px 14px; border-radius: 8px;
    border: 1.5px solid #cde; font-size: 15px; margin-bottom: 14px;
    outline: none; transition: border .2s;
  }
  .login-card select:focus, .login-card input:focus { border-color: var(--green-light); }
  .login-card button {
    width: 100%; padding: 12px; background: var(--green); color: #fff;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-card button:hover { background: var(--green-light); }
  .login-error { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }

  /* WEATHER BAR */
  #weather-bar {
    background: linear-gradient(90deg, #0d2b1e 0%, #1a4733 100%);
    color: #fff; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 28px;
    padding: 6px 20px; position: sticky; top: 0; z-index: 102;
    flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #weather-bar .w-location {
    font-weight: 700; font-size: 12px; opacity: .75; letter-spacing: .5px; text-transform: uppercase;
  }
  #weather-bar .w-item {
    display: flex; align-items: center; gap: 6px;
  }
  #weather-bar .w-icon { font-size: 18px; }
  #weather-bar .w-val { font-size: 18px; font-weight: 800; }
  #weather-bar .w-unit { font-size: 11px; opacity: .75; }
  #weather-bar .w-label { font-size: 11px; opacity: .7; margin-left: 2px; }
  #weather-bar .w-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.2); }
  #weather-bar .w-updated { font-size: 10px; opacity: .5; }
  #weather-bar .w-condition { font-size: 12px; opacity: .8; font-style: italic; }
  #weather-bar .w-loading { opacity: .6; font-size: 12px; }
  #weather-bar .w-error { opacity: .7; font-size: 12px; color: #ffbba0; }

  /* heat index color coding */
  .heat-extreme { color: #ff4444 !important; }
  .heat-very-hot { color: #ff8844 !important; }
  .heat-hot { color: #ffcc44 !important; }
  .heat-warm { color: #aaffaa !important; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  header {
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 60px; box-shadow: var(--shadow); position: sticky; top: 36px; z-index:101;
  }
  header .brand { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  header .header-right { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .role-badge { background: rgba(255,255,255,0.22); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  header button.logout {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 12px;
  }
  header button.logout:hover { background: rgba(255,255,255,0.28); }

  /* FARM SWITCHER BAR */
  #farm-bar {
    background: #1a4733; display: flex; align-items: center; gap: 0;
    padding: 0 16px; overflow-x: auto; border-bottom: 2px solid #0d2b1e;
    position: sticky; top: 96px; z-index: 99;
  }
  #farm-bar .farm-tab {
    padding: 10px 20px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6);
    cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap;
    transition: .15s; border: none; background: none;
  }
  #farm-bar .farm-tab:hover { color: #fff; }
  #farm-bar .farm-tab.active { color: #fff; border-bottom-color: var(--gold); }

  nav {
    background: var(--white); border-bottom: 1.5px solid #e0ead8;
    display: flex; gap: 0; padding: 0 14px; overflow-x: auto;
    position: sticky; top: 136px; z-index: 98;
  }
  nav button {
    background: none; border: none; padding: 12px 16px; font-size: 13px; cursor: pointer;
    color: var(--gray); border-bottom: 3px solid transparent; white-space: nowrap;
    transition: color .15s, border-color .15s; font-weight: 500;
  }
  nav button.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }
  nav button:hover { color: var(--green-light); }

  main { flex: 1; padding: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* FARM HEADER / PHOTOS */
  .farm-header {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 20px; overflow: hidden;
  }
  .farm-header-top {
    padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #eef3ee;
  }
  .farm-header-top h2 { font-size: 20px; color: var(--green); font-weight: 800; }
  .farm-photos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  }
  .farm-photo-slot {
    position: relative; height: 180px; background: #e8f0e8;
    border-right: 2px solid #fff; cursor: pointer; overflow: hidden;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    transition: background .2s;
  }
  .farm-photo-slot:last-child { border-right: none; }
  .farm-photo-slot:hover { background: #d8ead8; }
  .farm-photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .farm-photo-slot .photo-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex;
    align-items: center; justify-content: center; transition: background .2s;
  }
  .farm-photo-slot:hover .photo-overlay { background: rgba(0,0,0,0.25); }
  .farm-photo-slot .add-photo-hint { font-size: 13px; color: var(--gray); text-align: center; padding: 10px; z-index:1; }
  .farm-photo-slot .add-photo-hint span { font-size: 32px; display: block; margin-bottom: 6px; }
  .farm-photo-slot .photo-actions {
    position: absolute; bottom: 8px; right: 8px; display: none; gap: 4px; z-index: 2;
  }
  .farm-photo-slot:hover .photo-actions { display: flex; }
  .farm-photo-slot .photo-actions button {
    background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 5px;
    padding: 4px 8px; font-size: 11px; cursor: pointer;
  }
  .photo-label {
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.45);
    color: #fff; font-size: 11px; padding: 4px 8px; z-index:1; display: none;
  }
  .farm-photo-slot img ~ .photo-label { display: block; }
  .photo-num {
    position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5);
    color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; z-index:1;
  }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 18px 16px; box-shadow: var(--shadow); }
  .stat-card .icon { font-size: 26px; }
  .stat-card .label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing:.5px; margin-top:4px; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top:2px; }
  .stat-card.green .value { color: var(--green); }
  .stat-card.orange .value { color: var(--orange); }
  .stat-card.blue .value { color: var(--sky); }
  .stat-card.red .value { color: var(--red); }

  .card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 18px; }
  .card h2 { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* FORMS */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.one { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #444; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 8px 11px; border-radius: 7px; border: 1.5px solid #d0ddd0;
    font-size: 13px; outline: none; transition: border .2s; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green-light); }
  .form-group textarea { resize: vertical; min-height: 75px; }

  /* PHOTO UPLOAD IN TASK */
  .task-photo-upload {
    border: 2px dashed #b8d4b8; border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
    background: #f8fdf8;
  }
  .task-photo-upload:hover { border-color: var(--green-light); background: #f0f9f0; }
  .task-photo-upload input[type=file] { display: none; }
  .task-photo-upload .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .task-photo-upload p { font-size: 12px; color: var(--gray); }
  .task-photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .task-photo-preview .preview-item {
    position: relative; width: 80px; height: 80px; border-radius: 7px; overflow: hidden;
    border: 2px solid #d0e8d0;
  }
  .task-photo-preview .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .task-photo-preview .preview-item .remove-photo {
    position: absolute; top: 2px; right: 2px; background: rgba(214,40,40,0.85);
    color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* BUTTONS */
  .btn { padding: 8px 20px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-light); }
  .btn-secondary { background: #e8f0e8; color: var(--green); }
  .btn-secondary:hover { background: #d0e4d0; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #b52020; }
  .btn-sm { padding: 4px 11px; font-size: 11px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f0f7f0; color: var(--green); font-weight: 700; padding: 9px 11px; text-align: left; border-bottom: 2px solid #d0e8d0; }
  td { padding: 9px 11px; border-bottom: 1px solid #eef3ee; vertical-align: middle; }
  tr:hover td { background: #f8fdf8; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-green { background: #d8f3dc; color: var(--green); }
  .badge-orange { background: #ffe8cc; color: #b85c00; }
  .badge-red { background: #fde8e8; color: var(--red); }
  .badge-blue { background: #dbeafe; color: var(--blue); }
  .badge-gray { background: #e9ecef; color: var(--gray); }
  .badge-gold { background: #fff3cd; color: #856404; }

  .priority-high { color: var(--red); font-weight: 700; }
  .priority-medium { color: var(--orange); font-weight: 700; }
  .priority-low { color: var(--green); font-weight: 700; }

  /* SEARCH */
  .search-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .search-bar input { flex: 1; min-width: 150px; padding: 8px 12px; border-radius: 7px; border: 1.5px solid #d0ddd0; font-size: 13px; outline: none; }
  .search-bar input:focus { border-color: var(--green-light); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 24px; width: 540px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.22);
  }
  .modal h3 { font-size: 15px; color: var(--green); margin-bottom: 16px; font-weight: 700; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* TIMELINE */
  .timeline { list-style: none; padding: 0; }
  .timeline li { display: flex; gap: 12px; margin-bottom: 14px; }
  .timeline .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 4px; }
  .timeline .dot.orange { background: var(--orange); }
  .timeline .dot.red { background: var(--red); }
  .timeline .dot.blue { background: var(--sky); }
  .timeline .content { flex: 1; }
  .timeline .content .tl-title { font-weight: 600; font-size: 13px; }
  .timeline .content .tl-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .timeline .content .tl-body { font-size: 12px; color: #444; margin-top: 3px; line-height: 1.5; }

  /* ALERT */
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .alert-warn { background: #fff3cd; color: #856404; }
  .alert-success { background: #d8f3dc; color: var(--green); }

  /* EMPTY */
  .empty { text-align: center; padding: 36px 20px; color: var(--gray); }
  .empty .empty-icon { font-size: 44px; margin-bottom: 10px; }

  /* LIGHTBOX */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    z-index: 9999; align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 8px; box-shadow: 0 4px 40px rgba(0,0,0,0.6); }
  #lightbox button { position: absolute; top: 18px; right: 22px; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }

  /* TASK PHOTO THUMB IN TABLE */
  .task-thumb { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; cursor: pointer; border: 2px solid #d0e8d0; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr; }
    main { padding: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .farm-photos-grid { grid-template-columns: 1fr; }
    .farm-photo-slot { height: 140px; border-right: none; border-bottom: 2px solid #fff; }
  }
  @media print {
    header, #farm-bar, nav, .btn, .search-bar { display: none !important; }
    main { padding: 0; max-width: 100%; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<!-- WEATHER BAR (always visible) -->
<div id="weather-bar">
  <span class="w-location">📍 Al Dhaid, Sharjah — UAE</span>
  <div class="w-divider"></div>
  <span class="w-loading" id="weather-content">⏳ Loading weather...</span>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🌾</div>
    <h1>Farm Follow-Up System</h1>
    <p>Almaimoon Agricultural Management</p>
    <select id="login-user">
      <option value="">— Select User —</option>
      <option value="admin">Admin (Farm Manager)</option>
      <option value="struct_eng">Structural Engineer</option>
      <option value="agro_eng">Agricultural Engineer</option>
      <option value="soil_eng">Soil Engineer</option>
    </select>
    <input type="password" id="login-pass" placeholder="Password" />
    <button onclick="doLogin()">Login</button>
    <div class="login-error" id="login-error"></div>
    <p style="margin-top:16px;font-size:11px;color:#aaa;">Admin: admin123 &nbsp;|&nbsp; Engineers: eng123</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;">
  <header>
    <div class="brand">🌾 <span id="header-farm-name">Farm Follow-Up</span></div>
    <div class="header-right">
      <span id="header-name"></span>
      <span class="role-badge" id="header-role"></span>
      <button class="logout" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <!-- FARM SWITCHER -->
  <div id="farm-bar">
    <button class="farm-tab" onclick="switchFarm('wusha')">🏡 Wusha Farm</button>
    <button class="farm-tab" onclick="switchFarm('almaimoon')">🌿 Almaimoon Farm</button>
    <button class="farm-tab" onclick="switchFarm('charity')">❤️ Wusha Charity Farm</button>
  </div>

  <nav id="main-nav"></nav>
  <main id="main-content"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
// ====================== CONSTANTS ======================
const USERS = {
  admin:      { name: 'Farm Manager',          role: 'Admin',        password: 'admin123', color: '#2d6a4f' },
  struct_eng: { name: 'Structural Engineer',   role: 'Struct. Eng.', password: 'eng123',   color: '#1d3557' },
  agro_eng:   { name: 'Agricultural Engineer', role: 'Agro. Eng.',   password: 'eng123',   color: '#6b4226' },
  soil_eng:   { name: 'Soil Engineer',         role: 'Soil Eng.',    password: 'eng123',   color: '#e07b39' },
};

const FARMS = {
  wusha:     { name: 'Wusha Farm',          icon: '🏡', color: '#2d6a4f' },
  almaimoon: { name: 'Almaimoon Farm',       icon: '🌿', color: '#1d7a4a' },
  charity:   { name: 'Wusha Charity Farm',   icon: '❤️', color: '#8b2252' },
};

// ====================== DATA LAYER ======================
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getFarmData(farmId) {
  return load('farm_' + farmId, { tasks: [], reports: [], visits: [], issues: [], notes: [], photos: ['','',''] });
}
function saveFarmData(farmId, d) { save('farm_' + farmId, d); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d) { if(!d) return '—'; const p = d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'just now'; if (m < 60) return m+'m ago';
  if (m < 1440) return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ====================== STATE ======================
let currentUser = null;
let currentFarm = 'wusha';
let activePage = 'dashboard';
let pendingPhotoSlot = null;
let pendingTaskPhotos = [];

// ====================== AUTH ======================
function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  if (!u) { showLoginError('Please select a user.'); return; }
  if (p !== USERS[u].password) { showLoginError('Wrong password.'); return; }
  currentUser = u;
  save('farm_session', u);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}
function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}
function doLogout() {
  localStorage.removeItem('farm_session');
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// auto-resume
(function() {
  const s = load('farm_session', null);
  if (s && USERS[s]) {
    currentUser = s;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    setTimeout(initApp, 0);
  }
})();

// ====================== APP INIT ======================
const NAV_ADMIN = [
  { id: 'dashboard', label: '📊 Dashboard' },
  { id: 'farm-profile', label: '🏡 Farm Profile' },
  { id: 'tasks', label: '✅ Tasks' },
  { id: 'reports', label: '📋 Reports' },
  { id: 'visits', label: '🚜 Visits' },
  { id: 'issues', label: '⚠️ Issues' },
  { id: 'notes', label: '📝 Notes' },
  { id: 'team', label: '👥 Team' },
];
const NAV_ENG = [
  { id: 'dashboard', label: '📊 Dashboard' },
  { id: 'farm-profile', label: '🏡 Farm Profile' },
  { id: 'my-tasks', label: '✅ My Tasks' },
  { id: 'reports', label: '📋 Reports' },
  { id: 'visits', label: '🚜 Visits' },
  { id: 'issues', label: '⚠️ Issues' },
  { id: 'notes', label: '📝 Notes' },
];

function initApp() {
  document.getElementById('header-name').textContent = USERS[currentUser].name;
  document.getElementById('header-role').textContent = USERS[currentUser].role;
  buildNav();
  switchFarm(currentFarm);
}

function buildNav() {
  const items = currentUser === 'admin' ? NAV_ADMIN : NAV_ENG;
  document.getElementById('main-nav').innerHTML = items.map(n =>
    `<button onclick="navigate('${n.id}')" id="nav-${n.id}">${n.label}</button>`
  ).join('');
}

function switchFarm(farmId) {
  currentFarm = farmId;
  const farm = FARMS[farmId];
  document.getElementById('header-farm-name').textContent = farm.icon + ' ' + farm.name;
  document.querySelectorAll('#farm-bar .farm-tab').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(FARMS)[i] === farmId);
  });
  navigate('dashboard');
}

function navigate(page) {
  activePage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main-content');
  const isAdmin = currentUser === 'admin';
  if (page === 'dashboard')     main.innerHTML = isAdmin ? renderAdminDashboard() : renderEngDashboard();
  else if (page === 'farm-profile') main.innerHTML = renderFarmProfile();
  else if (page === 'tasks' || page === 'my-tasks') main.innerHTML = renderTasks(isAdmin ? null : currentUser);
  else if (page === 'reports')  main.innerHTML = renderReports(isAdmin ? null : currentUser);
  else if (page === 'visits')   main.innerHTML = renderVisits(isAdmin ? null : currentUser);
  else if (page === 'issues')   main.innerHTML = renderIssues(isAdmin ? null : currentUser);
  else if (page === 'notes')    main.innerHTML = renderNotes(isAdmin ? null : currentUser);
  else if (page === 'team')     main.innerHTML = renderTeam();
}

// ====================== FARM PROFILE (PHOTOS) ======================
function renderFarmProfile() {
  const d = getFarmData(currentFarm);
  const farm = FARMS[currentFarm];
  const photos = d.photos || ['','',''];
  const labels = ['Main View', 'Field Area', 'Infrastructure'];
  const isAdmin = currentUser === 'admin';

  return `
  <div class="farm-header">
    <div class="farm-header-top">
      <h2>${farm.icon} ${farm.name}</h2>
      ${isAdmin ? `<button class="btn btn-primary btn-sm" onclick="saveFarmInfo()">💾 Save Info</button>` : ''}
    </div>
    <div class="farm-photos-grid">
      ${photos.map((ph, i) => `
        <div class="farm-photo-slot" onclick="${isAdmin?`triggerFarmPhoto(${i})`:'openLightbox(this)'}">
          <span class="photo-num">Photo ${i+1}</span>
          ${ph ? `<img src="${ph}" alt="${labels[i]}" />
            <div class="photo-label">${labels[i]}</div>
            <div class="photo-actions">
              ${isAdmin ? `<button onclick="event.stopPropagation();triggerFarmPhoto(${i})">Change</button>
              <button onclick="event.stopPropagation();removeFarmPhoto(${i})">Remove</button>` : ''}
              <button onclick="event.stopPropagation();openLightboxSrc('${ph}')">🔍 View</button>
            </div>` :
            `<div class="add-photo-hint"><span>📷</span>${isAdmin?'Click to add photo':'No photo'}<br><small>${labels[i]}</small></div>`}
        </div>`).join('')}
    </div>
    <input type="file" id="farm-photo-input" accept="image/*" style="display:none" onchange="onFarmPhotoSelected(event)" />
  </div>

  <div class="card">
    <h2>📝 Farm Information</h2>
    <div class="form-row three">
      <div class="form-group"><label>Farm Name</label>
        <input id="fi-name" value="${esc(d.info?.name||farm.name)}" ${isAdmin?'':'readonly'} /></div>
      <div class="form-group"><label>Location</label>
        <input id="fi-loc" value="${esc(d.info?.location||'')}" placeholder="City / Region" ${isAdmin?'':'readonly'} /></div>
      <div class="form-group"><label>Area (Hectares)</label>
        <input id="fi-area" value="${esc(d.info?.area||'')}" placeholder="e.g. 50" ${isAdmin?'':'readonly'} /></div>
    </div>
    <div class="form-row three">
      <div class="form-group"><label>Crop Types</label>
        <input id="fi-crops" value="${esc(d.info?.crops||'')}" placeholder="e.g. Wheat, Dates" ${isAdmin?'':'readonly'} /></div>
      <div class="form-group"><label>Irrigation System</label>
        <input id="fi-irr" value="${esc(d.info?.irrigation||'')}" placeholder="e.g. Drip, Sprinkler" ${isAdmin?'':'readonly'} /></div>
      <div class="form-group"><label>Established</label>
        <input id="fi-est" type="date" value="${esc(d.info?.established||'')}" ${isAdmin?'':'readonly'} /></div>
    </div>
    <div class="form-row one">
      <div class="form-group"><label>Notes / Description</label>
        <textarea id="fi-notes" ${isAdmin?'':'readonly'}>${esc(d.info?.notes||'')}</textarea></div>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card green"><div class="icon">✅</div><div class="label">Open Tasks</div><div class="value">${(d.tasks||[]).filter(t=>t.status!=='Done').length}</div></div>
    <div class="stat-card blue"><div class="icon">📋</div><div class="label">Reports</div><div class="value">${(d.reports||[]).length}</div></div>
    <div class="stat-card orange"><div class="icon">🚜</div><div class="label">Field Visits</div><div class="value">${(d.visits||[]).length}</div></div>
    <div class="stat-card red"><div class="icon">⚠️</div><div class="label">Open Issues</div><div class="value">${(d.issues||[]).filter(i=>i.status!=='Resolved').length}</div></div>
  </div>`;
}

function triggerFarmPhoto(slot) {
  pendingPhotoSlot = slot;
  document.getElementById('farm-photo-input').click();
}

function onFarmPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const d = getFarmData(currentFarm);
    if (!d.photos) d.photos = ['','',''];
    d.photos[pendingPhotoSlot] = e.target.result;
    saveFarmData(currentFarm, d);
    navigate('farm-profile');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeFarmPhoto(slot) {
  if (!confirm('Remove this photo?')) return;
  const d = getFarmData(currentFarm);
  d.photos[slot] = '';
  saveFarmData(currentFarm, d);
  navigate('farm-profile');
}

function saveFarmInfo() {
  const d = getFarmData(currentFarm);
  d.info = {
    name: document.getElementById('fi-name').value,
    location: document.getElementById('fi-loc').value,
    area: document.getElementById('fi-area').value,
    crops: document.getElementById('fi-crops').value,
    irrigation: document.getElementById('fi-irr').value,
    established: document.getElementById('fi-est').value,
    notes: document.getElementById('fi-notes').value,
  };
  saveFarmData(currentFarm, d);
  navigate('farm-profile');
  showToast('Farm info saved!');
}

// ====================== LIGHTBOX ======================
function openLightbox(el) {
  const img = el.querySelector('img');
  if (img) openLightboxSrc(img.src);
}
function openLightboxSrc(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }

// ====================== TOAST ======================
function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2d6a4f;color:#fff;padding:10px 22px;border-radius:8px;font-size:14px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2)';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function phNeedBadge(text) {
  if (!text) return '—';
  const t = text.toLowerCase();
  let color = '#2d6a4f', bg = '#d8f3dc';
  if (t.includes('very high')) { color='#d62828'; bg='#fde8e8'; }
  else if (t.includes('high')) { color='#c05c00'; bg='#ffe8cc'; }
  else if (t.includes('moderate')) { color='#1d3557'; bg='#dbeafe'; }
  else if (t.includes('low')) { color='#2d6a4f'; bg='#d8f3dc'; }
  const shortText = text.replace('(young) / Moderate (mature)','*').replace('(early)','').replace('(fruiting)','').replace('(veg.) / Reduce (fruiting)','*').replace('(key micronutrient)','').replace('once established','').trim();
  return `<span style="background:${bg};color:${color};padding:2px 7px;border-radius:10px;font-weight:700;font-size:11px;white-space:nowrap">${shortText}</span>`;
}

// ====================== DASHBOARD: ADMIN ======================
function renderAdminDashboard() {
  const d = getFarmData(currentFarm);
  const farm = FARMS[currentFarm];
  const openTasks = d.tasks.filter(t=>t.status!=='Done').length;
  const done = d.tasks.filter(t=>t.status==='Done').length;
  const openIssues = d.issues.filter(i=>i.status!=='Resolved').length;

  const recent = [...(d.reports||[]),...(d.visits||[]),...(d.issues||[])]
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);

  const tasksByUser = {};
  d.tasks.forEach(t => {
    if (!tasksByUser[t.assignee]) tasksByUser[t.assignee] = {total:0,done:0};
    tasksByUser[t.assignee].total++;
    if (t.status==='Done') tasksByUser[t.assignee].done++;
  });

  return `
  <div class="alert alert-success" style="display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">${farm.icon}</span>
    <span>Viewing <strong>${farm.name}</strong> — use the farm switcher above to change farms</span>
  </div>
  <div class="stats-grid">
    <div class="stat-card orange"><div class="icon">✅</div><div class="label">Open Tasks</div><div class="value">${openTasks}</div></div>
    <div class="stat-card green"><div class="icon">🏆</div><div class="label">Completed</div><div class="value">${done}</div></div>
    <div class="stat-card red"><div class="icon">⚠️</div><div class="label">Open Issues</div><div class="value">${openIssues}</div></div>
    <div class="stat-card blue"><div class="icon">🚜</div><div class="label">Field Visits</div><div class="value">${d.visits.length}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:18px">
    <div class="card">
      <h2>👥 Team Progress</h2>
      ${Object.keys(USERS).filter(k=>k!=='admin').map(k => {
        const info = tasksByUser[k]||{total:0,done:0};
        const pct = info.total ? Math.round(info.done/info.total*100) : 0;
        return `<div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;margin-bottom:3px">
            <span style="font-size:13px;font-weight:600">${USERS[k].name}</span>
            <span style="font-size:12px;color:var(--gray)">${info.done}/${info.total}</span>
          </div>
          <div style="background:#e8f0e8;border-radius:10px;height:7px">
            <div style="background:var(--green);width:${pct}%;height:7px;border-radius:10px"></div>
          </div></div>`;
      }).join('')}
    </div>
    <div class="card">
      <h2>🕐 Recent Activity</h2>
      <ul class="timeline">
        ${recent.length ? recent.map(item => {
          const isVisit = !!item.visitDate, isIssue = !!item.priority && !item.visitDate && !item.reportDate;
          const dotCls = isIssue?'red':isVisit?'orange':'blue';
          const label = isVisit?'🚜 Visit':isIssue?'⚠️ Issue':'📋 Report';
          const title = item.title||item.farmSection||'—';
          return `<li><div class="dot ${dotCls}"></div><div class="content">
            <div class="tl-title">${label}: ${title}</div>
            <div class="tl-meta">${USERS[item.author]?.name||item.author} · ${timeAgo(item.createdAt)}</div>
          </div></li>`;
        }).join('') : '<li><div class="empty"><div class="empty-icon">📭</div>No activity yet</div></li>'}
      </ul>
    </div>
  </div>
  ${renderNutritionTable()}`;
}

// ====================== DASHBOARD: ENGINEER ======================
function renderEngDashboard() {
  const d = getFarmData(currentFarm);
  const farm = FARMS[currentFarm];
  const myTasks = d.tasks.filter(t=>t.assignee===currentUser);
  const myOpen = myTasks.filter(t=>t.status!=='Done').length;
  const myDone = myTasks.filter(t=>t.status==='Done').length;
  const overdue = myTasks.filter(t=>t.dueDate&&t.dueDate<today()&&t.status!=='Done');

  return `
  <div class="alert alert-success" style="display:flex;align-items:center;gap:10px">
    <span style="font-size:20px">${farm.icon}</span>
    <span>Viewing <strong>${farm.name}</strong></span>
  </div>
  ${overdue.length ? `<div class="alert alert-warn">⚠️ ${overdue.length} overdue task(s): ${overdue.map(t=>`<em>${t.title}</em>`).join(', ')}</div>` : ''}
  <div class="stats-grid">
    <div class="stat-card orange"><div class="icon">📋</div><div class="label">Open Tasks</div><div class="value">${myOpen}</div></div>
    <div class="stat-card green"><div class="icon">✅</div><div class="label">Completed</div><div class="value">${myDone}</div></div>
    <div class="stat-card blue"><div class="icon">📄</div><div class="label">Reports</div><div class="value">${d.reports.filter(r=>r.author===currentUser).length}</div></div>
    <div class="stat-card red"><div class="icon">⚠️</div><div class="label">Open Issues</div><div class="value">${d.issues.filter(i=>i.author===currentUser&&i.status!=='Resolved').length}</div></div>
  </div>
  <div class="card">
    <h2>📋 My Pending Tasks — ${farm.name}</h2>
    ${myTasks.filter(t=>t.status!=='Done').length===0
      ? '<div class="empty"><div class="empty-icon">🎉</div>All tasks complete!</div>'
      : `<ul class="timeline">${myTasks.filter(t=>t.status!=='Done').slice(0,6).map(t=>`
        <li><div class="dot ${t.priority==='High'?'red':t.priority==='Medium'?'orange':''}"></div>
        <div class="content">
          <div class="tl-title">${t.title}</div>
          <div class="tl-meta">Due: ${fmt(t.dueDate)} · <span class="priority-${t.priority?.toLowerCase()}">${t.priority}</span></div>
        </div></li>`).join('')}</ul>`}
  </div>

function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q)?'':'none';
  });
}
function filterByText(tableId, q) {
  if (!q) return;
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    row.style.display = row.textContent.includes(q)?'':'none';
  });
}

function photoPreviewItem(src, idx) {
  return `<div class="preview-item" id="tprev-${idx}">
    <img src="${src}" onclick="openLightboxSrc('${src}')" />
    <button class="remove-photo" onclick="removeTaskPhoto(${idx})">✕</button>
  </div>`;
}

function addTaskPhoto(event) {
  const file = event.target.files[0]; if (!file) return;
  if (pendingTaskPhotos.length >= 3) { alert('Maximum 3 photos per task'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const idx = pendingTaskPhotos.length;
    pendingTaskPhotos.push(e.target.result);
    const prev = document.getElementById('task-photo-preview');
    if (prev) prev.insertAdjacentHTML('beforeend', photoPreviewItem(e.target.result, idx));
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeTaskPhoto(idx) {
  pendingTaskPhotos[idx] = '';
  const el = document.getElementById('tprev-'+idx);
  if (el) el.remove();
}

function saveTask(id) {
  const d = getFarmData(currentFarm);
  const title = document.getElementById('t-title').value.trim();
  if (!title) { alert('Title is required'); return; }
  const existing = id ? d.tasks.find(t=>t.id===id) : null;
  const task = {
    id: id||uid(), title,
    assignee: document.getElementById('t-assignee').value,
    status: document.getElementById('t-status').value,
    priority: document.getElementById('t-priority').value,
    dueDate: document.getElementById('t-due').value,
    category: document.getElementById('t-cat').value,
    description: document.getElementById('t-desc').value,
    progressNotes: document.getElementById('t-progress').value,
    photos: pendingTaskPhotos.filter(Boolean),
    farm: currentFarm,
    createdAt: existing?.createdAt||new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  if (id) { const i=d.tasks.findIndex(t=>t.id===id); if(i>-1) d.tasks[i]=task; }
  else d.tasks.push(task);
  saveFarmData(currentFarm, d);
  closeModal();
  navigate(currentUser==='admin'?'tasks':'my-tasks');
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  const d = getFarmData(currentFarm);
  d.tasks = d.tasks.filter(t=>t.id!==id);
  saveFarmData(currentFarm, d);
  navigate('tasks');
}

function saveIssue(id) {
  const d = getFarmData(currentFarm);
  const title = document.getElementById('i-title').value.trim();
  const desc = document.getElementById('i-desc').value.trim();
  if(!title||!desc){alert('Title and description required');return;}
  const existing = id ? d.issues.find(x=>x.id===id) : null;
  const issue = {
    id:id||uid(), title,
    priority:document.getElementById('i-priority').value,
    category:document.getElementById('i-cat').value,
    location:document.getElementById('i-loc').value,
    description:desc,
    solution:document.getElementById('i-sol').value,
    status:existing?.status||'Open',
    author:currentUser,
    createdAt:existing?.createdAt||new Date().toISOString(),
  };
  if(id){const idx=d.issues.findIndex(x=>x.id===id);if(idx>-1)d.issues[idx]=issue;}
  else d.issues.push(issue);
  saveFarmData(currentFarm, d); closeModal(); navigate('issues');
}

function openEditIssue(id) {
  const d=getFarmData(currentFarm); const i=d.issues.find(x=>x.id===id); if(!i) return;
  openModal('Edit Issue',`
    <div class="form-row"><div class="form-group">
      <label>Title *</label><input id="i-title" value="${esc(i.title)}" />
    </div><div class="form-group">
      <label>Priority</label>
      <select id="i-priority">${['High','Medium','Low'].map(p=>`<option ${p===i.priority?'selected':''}>${p}</option>`).join('')}</select>
    </div></div>
    <div class="form-row"><div class="form-group">
      <label>Category</label>
      <select id="i-cat">${['Structural','Irrigation','Soil','Crop','Equipment','Pest/Disease','Water','General'].map(c=>`<option ${c===i.category?'selected':''}>${c}</option>`).join('')}</select>
    </div><div class="form-group">
      <label>Location</label><input id="i-loc" value="${esc(i.location||'')}" />
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Description *</label><textarea id="i-desc">${esc(i.description)}</textarea>
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Suggested Solution</label><textarea id="i-sol">${esc(i.solution||'')}</textarea>
    </div></div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveIssue('${id}')">Update</button>`);
}

function viewIssue(id) {
  const d=getFarmData(currentFarm); const i=d.issues.find(x=>x.id===id); if(!i) return;
  openModal('Issue: '+i.title,`
    <div style="line-height:1.7">
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <span class="priority-${i.priority?.toLowerCase()}">${i.priority}</span>
        <span class="badge ${i.status==='Resolved'?'badge-green':i.status==='In Progress'?'badge-orange':'badge-red'}">${i.status}</span>
        <span class="badge badge-blue">${i.category}</span>
      </div>
      <p><strong>By:</strong> ${USERS[i.author]?.name||i.author} &nbsp; <strong>Location:</strong> ${i.location||'—'}</p>
      <hr style="margin:10px 0;border-color:#e0ead8">
      <p><strong>Description:</strong></p><p style="color:#444;margin-top:4px">${esc(i.description)}</p>
      ${i.solution?`<p style="margin-top:10px"><strong>Solution:</strong></p><p style="color:#444;margin-top:4px">${esc(i.solution)}</p>`:''}
    </div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Close</button>`);
}

function resolveIssue(id) {
  if(!confirm('Mark as resolved?')) return;
  const d=getFarmData(currentFarm); const i=d.issues.find(x=>x.id===id);
  if(i){i.status='Resolved';i.resolvedBy=currentUser;i.resolvedAt=new Date().toISOString();}
  saveFarmData(currentFarm, d); navigate('issues');
}

// ====================== NOTES ======================
function renderNotes(filterUser) {
  const d = getFarmData(currentFarm);
  const farm = FARMS[currentFarm];
  let notes = filterUser ? d.notes.filter(n=>n.author===filterUser) : d.notes;

  return `
  <div class="card">
    <h2>📝 Notes — ${farm.name}
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openAddNote()">+ Add Note</button>
    </h2>
    <div class="search-bar">
      <input type="text" placeholder="Search notes..." oninput="filterNotes(this.value)" />
    </div>
    <div id="notes-container" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
      ${notes.length===0?'<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📝</div>No notes yet</div>':
      notes.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(n=>`
        <div class="note-card" style="background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);border-left:4px solid ${noteColor(n.tag)}" data-text="${esc((n.title+n.content).toLowerCase())}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px">
            <strong style="font-size:13px">${esc(n.title)}</strong>
            <span class="badge badge-${n.tag==='Important'?'red':n.tag==='Reminder'?'orange':'blue'}">${n.tag}</span>
          </div>
          <p style="font-size:12px;color:#555;line-height:1.5;margin-bottom:9px">${esc(n.content.slice(0,140))}${n.content.length>140?'…':''}</p>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <small style="color:var(--gray)">${USERS[n.author]?.name||n.author} · ${timeAgo(n.createdAt)}</small>
            ${(currentUser==='admin'||n.author===currentUser)?`<button class="btn btn-danger btn-sm" onclick="deleteNote('${n.id}')">Del</button>`:''}
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function noteColor(tag) {
  return tag==='Important'?'#d62828':tag==='Reminder'?'#e07b39':tag==='Info'?'#457b9d':'#40916c';
}
function filterNotes(q) {
  document.querySelectorAll('.note-card').forEach(c=>{
    c.style.display=c.dataset.text.includes(q.toLowerCase())?'':'none';
  });
}
function openAddNote() {
  openModal('Add Note',`
    <div class="form-row"><div class="form-group">
      <label>Title *</label><input id="n-title" placeholder="Note title" />
    </div><div class="form-group">
      <label>Tag</label>
      <select id="n-tag"><option>Note</option><option>Important</option><option>Reminder</option><option>Info</option></select>
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Content *</label><textarea id="n-content" style="min-height:100px" placeholder="Write your note..."></textarea>
    </div></div>
  `,`<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveNote()">Save</button>`);
}
function saveNote() {
  const d=getFarmData(currentFarm);
  const title=document.getElementById('n-title').value.trim();
  const content=document.getElementById('n-content').value.trim();
  if(!title||!content){alert('Title and content required');return;}
  d.notes.push({id:uid(),title,content,tag:document.getElementById('n-tag').value,author:currentUser,createdAt:new Date().toISOString()});
  saveFarmData(currentFarm, d); closeModal(); navigate('notes');
}
function deleteNote(id) {
  if(!confirm('Delete?')) return;
  const d=getFarmData(currentFarm); d.notes=d.notes.filter(n=>n.id!==id);
  saveFarmData(currentFarm, d); navigate('notes');
}

// ====================== TEAM (ADMIN) ======================

          <div style="text-align:center;background:#f8fdf8;padding:10px;border-radius:7px">

          <div style="text-align:center;background:#f8fdf8;padding:10px;border-radius:7px">

        </div>

function openAssignTask(assignee) {
  pendingTaskPhotos = [];
  openModal(`Assign Task to ${USERS[assignee]?.name}`, taskFormHTML({assignee}, true),
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveTask()">Assign</button>`);

// ====================== WEATHER ======================
// Al Dhaid, Sharjah coordinates
const WEATHER_LAT = 25.2878;
const WEATHER_LON = 55.8890;
const WMO_CODES = {
  0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain', 71:'Light snow', 73:'Snow', 75:'Heavy snow',
  77:'Snow grains', 80:'Light showers', 81:'Showers', 82:'Heavy showers',
  85:'Snow showers', 86:'Heavy snow showers', 95:'Thunderstorm',
  96:'Thunderstorm + hail', 99:'Thunderstorm + heavy hail',
};
const WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌧️', 55:'🌧️', 61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'❄️', 73:'❄️', 75:'❄️', 77:'🌨️', 80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};

function heatIndexClass(t) {
  if (t >= 45) return 'heat-extreme';
  if (t >= 38) return 'heat-very-hot';
  if (t >= 32) return 'heat-hot';
  if (t >= 26) return 'heat-warm';
  return '';
}

async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m` +
    `&wind_speed_unit=kmh&timezone=Asia%2FDubai`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const c = data.current;
    const temp = Math.round(c.temperature_2m);
    const feels = Math.round(c.apparent_temperature);
    const hum = Math.round(c.relative_humidity_2m);
    const wind = Math.round(c.wind_speed_10m);
    const code = c.weather_code;
    const icon = WMO_ICONS[code] || '🌡️';
    const cond = WMO_CODES[code] || 'Unknown';
    const now = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    const heatCls = heatIndexClass(temp);

    document.getElementById('weather-content').outerHTML = `
      <div class="w-item">
        <span class="w-icon">${icon}</span>
        <span class="w-val ${heatCls}">${temp}°C</span>
        <span class="w-unit">/ Feels ${feels}°C</span>
      </div>
      <div class="w-divider"></div>
      <div class="w-item">
        <span class="w-icon">💧</span>
        <span class="w-val">${hum}%</span>
        <span class="w-label">Humidity</span>
      </div>
      <div class="w-divider"></div>
      <div class="w-item">
        <span class="w-icon">💨</span>
        <span class="w-val">${wind}</span>
        <span class="w-unit">km/h</span>
      </div>
      <div class="w-divider"></div>
      <span class="w-condition">${cond}</span>
      <span class="w-updated">Updated ${now}</span>`;
  } catch(e) {
    const el = document.getElementById('weather-content');
    if (el) el.outerHTML = `<span class="w-error">⚠️ Weather unavailable — check connection</span>`;
  }
}

// fetch immediately, then refresh every 10 minutes
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

// ====================== MODAL ======================
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOverlay(e) {
  if (e.target===document.getElementById('modal-overlay')) closeModal();
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
