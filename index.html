<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Follow-Up System - Almaimoon</title>
<style>
  :root {
    --green: #2d6a4f; --green-light: #40916c; --green-pale: #d8f3dc;
    --brown: #6b4226; --gold: #e9c46a; --red: #d62828;
    --blue: #1d3557; --sky: #457b9d; --orange: #e07b39;
    --gray: #6c757d; --bg: #f4f7f4; --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.10); --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #222; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #2d6a4f 0%, #40916c 50%, #d8f3dc 100%);
  }
  .login-card {
    background: var(--white); border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    padding: 40px 36px; width: 380px; text-align: center;
  }
  .login-card .logo { font-size: 52px; margin-bottom: 8px; }
  .login-card h1 { color: var(--green); font-size: 22px; margin-bottom: 4px; }
  .login-card p { color: var(--gray); font-size: 13px; margin-bottom: 24px; }
  .login-card select, .login-card input {
    width: 100%; padding: 11px 14px; border-radius: 8px;
    border: 1.5px solid #cde; font-size: 15px; margin-bottom: 14px;
    outline: none; transition: border .2s;
  }
  .login-card select:focus, .login-card input:focus { border-color: var(--green-light); }
  .login-card button {
    width: 100%; padding: 12px; background: var(--green); color: #fff;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-card button:hover { background: var(--green-light); }
  .login-error { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }

  /* WEATHER BAR */
  #weather-bar {
    background: linear-gradient(90deg, #0d2b1e 0%, #1a4733 100%);
    color: #fff; font-size: 13px;
    display: flex; align-items: center; justify-content: center; gap: 28px;
    padding: 6px 20px; position: sticky; top: 0; z-index: 102;
    flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  #weather-bar .w-location {
    font-weight: 700; font-size: 12px; opacity: .75; letter-spacing: .5px; text-transform: uppercase;
  }
  #weather-bar .w-item {
    display: flex; align-items: center; gap: 6px;
  }
  #weather-bar .w-icon { font-size: 18px; }
  #weather-bar .w-val { font-size: 18px; font-weight: 800; }
  #weather-bar .w-unit { font-size: 11px; opacity: .75; }
  #weather-bar .w-label { font-size: 11px; opacity: .7; margin-left: 2px; }
  #weather-bar .w-divider { width: 1px; height: 22px; background: rgba(255,255,255,0.2); }
  #weather-bar { flex-direction: column; align-items: stretch; padding: 6px 16px; gap: 0; }
  #weather-current { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #weather-forecast { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
  .w-day { background: rgba(255,255,255,0.12); border-radius: 8px; padding: 5px 12px; display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .w-day-label { opacity: 0.75; font-size: 11px; }
  .w-day-temp { font-weight: 700; }
  .w-day-range { opacity: 0.7; font-size: 11px; }

  /* heat index color coding */
  .heat-extreme { color: #ff4444 !important; }
  .heat-very-hot { color: #ff8844 !important; }
  .heat-hot { color: #ffcc44 !important; }
  .heat-warm { color: #aaffaa !important; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  header {
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; height: 60px; box-shadow: var(--shadow); position: sticky; top: 36px; z-index:101;
  }
  header .brand { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  header .header-right { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .role-badge { background: rgba(255,255,255,0.22); padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  header button.logout {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; padding: 5px 12px; border-radius: 7px; cursor: pointer; font-size: 12px;
  }
  header button.logout:hover { background: rgba(255,255,255,0.28); }

  /* FARM SWITCHER BAR */
  #farm-bar {
    background: #1a4733; display: flex; align-items: center; gap: 0;
    padding: 0 16px; overflow-x: auto; border-bottom: 2px solid #0d2b1e;
    position: sticky; top: 96px; z-index: 99;
  }
  #farm-bar .farm-tab {
    padding: 10px 20px; font-size: 13px; font-weight: 600; color: rgba(255,255,255,0.6);
    cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap;
    transition: .15s; border: none; background: none;
  }
  #farm-bar .farm-tab:hover { color: #fff; }
  #farm-bar .farm-tab.active { color: #fff; border-bottom-color: var(--gold); }

  nav {
    background: var(--white); border-bottom: 1.5px solid #e0ead8;
    display: flex; gap: 0; padding: 0 14px; overflow-x: auto;
    position: sticky; top: 136px; z-index: 98;
  }
  nav button {
    background: none; border: none; padding: 12px 16px; font-size: 13px; cursor: pointer;
    color: var(--gray); border-bottom: 3px solid transparent; white-space: nowrap;
    transition: color .15s, border-color .15s; font-weight: 500;
  }
  nav button.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }
  nav button:hover { color: var(--green-light); }

  main { flex: 1; padding: 20px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* FARM HEADER / PHOTOS */
  .farm-header {
    background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow);
    margin-bottom: 20px; overflow: hidden;
  }
  .farm-header-top {
    padding: 18px 20px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #eef3ee;
  }
  .farm-header-top h2 { font-size: 20px; color: var(--green); font-weight: 800; }
  .farm-photos-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
  }
  .farm-photo-slot {
    position: relative; height: 180px; background: #e8f0e8;
    border-right: 2px solid #fff; cursor: pointer; overflow: hidden;
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    transition: background .2s;
  }
  .farm-photo-slot:last-child { border-right: none; }
  .farm-photo-slot:hover { background: #d8ead8; }
  .farm-photo-slot img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .farm-photo-slot .photo-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,0); display: flex;
    align-items: center; justify-content: center; transition: background .2s;
  }
  .farm-photo-slot:hover .photo-overlay { background: rgba(0,0,0,0.25); }
  .farm-photo-slot .add-photo-hint { font-size: 13px; color: var(--gray); text-align: center; padding: 10px; z-index:1; }
  .farm-photo-slot .add-photo-hint span { font-size: 32px; display: block; margin-bottom: 6px; }
  .farm-photo-slot .photo-actions {
    position: absolute; bottom: 8px; right: 8px; display: none; gap: 4px; z-index: 2;
  }
  .farm-photo-slot:hover .photo-actions { display: flex; }
  .farm-photo-slot .photo-actions button {
    background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 5px;
    padding: 4px 8px; font-size: 11px; cursor: pointer;
  }
  .photo-label {
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.45);
    color: #fff; font-size: 11px; padding: 4px 8px; z-index:1; display: none;
  }
  .farm-photo-slot img ~ .photo-label { display: block; }
  .photo-num {
    position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.5);
    color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; z-index:1;
  }

  /* STATS GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-card { background: var(--white); border-radius: var(--radius); padding: 18px 16px; box-shadow: var(--shadow); }
  .stat-card .icon { font-size: 26px; }
  .stat-card .label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing:.5px; margin-top:4px; }
  .stat-card .value { font-size: 26px; font-weight: 700; margin-top:2px; }
  .stat-card.green .value { color: var(--green); }
  .stat-card.orange .value { color: var(--orange); }
  .stat-card.blue .value { color: var(--sky); }
  .stat-card.purple .value { color: #7b2d8b; }
  .stat-card.red .value { color: var(--red); }

  .card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); margin-bottom: 18px; }
  .card h2 { font-size: 15px; font-weight: 700; color: var(--green); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

  /* FORMS */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.one { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; font-weight: 600; color: #444; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 8px 11px; border-radius: 7px; border: 1.5px solid #d0ddd0;
    font-size: 13px; outline: none; transition: border .2s; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green-light); }
  .form-group textarea { resize: vertical; min-height: 75px; }

  /* PHOTO UPLOAD IN TASK */
  .task-photo-upload {
    border: 2px dashed #b8d4b8; border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer; transition: border-color .2s, background .2s;
    background: #f8fdf8;
  }
  .task-photo-upload:hover { border-color: var(--green-light); background: #f0f9f0; }
  .task-photo-upload input[type=file] { display: none; }
  .task-photo-upload .upload-icon { font-size: 28px; margin-bottom: 6px; }
  .task-photo-upload p { font-size: 12px; color: var(--gray); }
  .task-photo-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .task-photo-preview .preview-item {
    position: relative; width: 80px; height: 80px; border-radius: 7px; overflow: hidden;
    border: 2px solid #d0e8d0;
  }
  .task-photo-preview .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .task-photo-preview .preview-item .remove-photo {
    position: absolute; top: 2px; right: 2px; background: rgba(214,40,40,0.85);
    color: #fff; border: none; border-radius: 50%; width: 18px; height: 18px;
    font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* BUTTONS */
  .btn { padding: 8px 20px; border-radius: 7px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-light); }
  .btn-secondary { background: #e8f0e8; color: var(--green); }
  .btn-secondary:hover { background: #d0e4d0; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #b52020; }
  .btn-sm { padding: 4px 11px; font-size: 11px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f0f7f0; color: var(--green); font-weight: 700; padding: 9px 11px; text-align: left; border-bottom: 2px solid #d0e8d0; }
  td { padding: 9px 11px; border-bottom: 1px solid #eef3ee; vertical-align: middle; }
  tr:hover td { background: #f8fdf8; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 10px; font-weight: 700; }
  .badge-green { background: #d8f3dc; color: var(--green); }
  .badge-orange { background: #ffe8cc; color: #b85c00; }
  .badge-red { background: #fde8e8; color: var(--red); }
  .badge-blue { background: #dbeafe; color: var(--blue); }
  .badge-gray { background: #e9ecef; color: var(--gray); }
  .badge-gold { background: #fff3cd; color: #856404; }

  .priority-high { color: var(--red); font-weight: 700; }
  .priority-medium { color: var(--orange); font-weight: 700; }
  .priority-low { color: var(--green); font-weight: 700; }

  /* SEARCH */
  .search-bar { display: flex; gap: 8px; margin-bottom: 14px; align-items: center; flex-wrap: wrap; }
  .search-bar input { flex: 1; min-width: 150px; padding: 8px 12px; border-radius: 7px; border: 1.5px solid #d0ddd0; font-size: 13px; outline: none; }
  .search-bar input:focus { border-color: var(--green-light); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 24px; width: 540px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.22);
  }
  .modal h3 { font-size: 15px; color: var(--green); margin-bottom: 16px; font-weight: 700; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }

  /* TIMELINE */
  .timeline { list-style: none; padding: 0; }
  .timeline li { display: flex; gap: 12px; margin-bottom: 14px; }
  .timeline .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 4px; }
  .timeline .dot.orange { background: var(--orange); }
  .timeline .dot.red { background: var(--red); }
  .timeline .dot.blue { background: var(--sky); }
  .timeline .content { flex: 1; }
  .timeline .content .tl-title { font-weight: 600; font-size: 13px; }
  .timeline .content .tl-meta { font-size: 11px; color: var(--gray); margin-top: 2px; }
  .timeline .content .tl-body { font-size: 12px; color: #444; margin-top: 3px; line-height: 1.5; }

  /* ALERT */
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 12px; }
  .alert-warn { background: #fff3cd; color: #856404; }
  .alert-success { background: #d8f3dc; color: var(--green); }

  /* EMPTY */
  .empty { text-align: center; padding: 36px 20px; color: var(--gray); }
  .empty .empty-icon { font-size: 44px; margin-bottom: 10px; }

  /* LIGHTBOX */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    z-index: 9999; align-items: center; justify-content: center;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 8px; box-shadow: 0 4px 40px rgba(0,0,0,0.6); }
  #lightbox button { position: absolute; top: 18px; right: 22px; background: rgba(255,255,255,0.15); color: #fff; border: none; border-radius: 50%; width: 36px; height: 36px; font-size: 18px; cursor: pointer; }

  /* TASK PHOTO THUMB IN TABLE */
  .task-thumb { width: 40px; height: 40px; border-radius: 5px; object-fit: cover; cursor: pointer; border: 2px solid #d0e8d0; }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr; }
    main { padding: 12px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .farm-photos-grid { grid-template-columns: 1fr; }
    .farm-photo-slot { height: 140px; border-right: none; border-bottom: 2px solid #fff; }
  }
  /* PLANT CURTAIN ANIMATION */
  @keyframes curtainDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .plant-card:active { transform: scale(0.96) !important; }

  @media print {
    header, #farm-bar, nav, .btn, .search-bar { display: none !important; }
    main { padding: 0; max-width: 100%; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<!-- WEATHER BAR (always visible) -->
<div id="weather-bar">
  <div id="weather-current">
    <span class="w-location">📍 Al Dhaid, Sharjah — UAE</span>
    <div class="w-divider"></div>
    <span class="w-loading" id="weather-content">⏳ Loading weather...</span>
  </div>
  <div id="weather-forecast"></div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🌾</div>
    <h1>Farm Follow-Up System</h1>
    <p>Almaimoon Agricultural Management</p>
    <select id="login-user">
      <option value="">— Select User —</option>
      <option value="admin">Admin (Farm Manager)</option>
      <option value="struct_eng">Structural Engineer</option>
      <option value="agro_eng">Agricultural Engineer</option>
      <option value="soil_eng">Soil Engineer</option>
      <option value="irr_eng">Irrigation Engineer</option>
      <option value="mois_eng">Mois (Electrical Engineer)</option>
      <option value="chetak">Chetak (Accountant)</option>
    </select>
    <input type="password" id="login-pass" placeholder="Password" />
    <button onclick="doLogin()">Login</button>
    <div class="login-error" id="login-error"></div>
    <p style="margin-top:16px;font-size:11px;color:#aaa;">Admin: admin495 &nbsp;|&nbsp; All others: farm495</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;">
  <header>
    <div class="brand">🌾 <span id="header-farm-name">Farm Follow-Up</span></div>
    <div class="header-right">
      <span id="header-name"></span>
      <span class="role-badge" id="header-role"></span>
      <button class="logout" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <!-- FARM SWITCHER -->
  <div id="farm-bar">
    <button class="farm-tab" onclick="switchFarm('wusha')">🏡 Wusha Farm</button>
    <button class="farm-tab" onclick="switchFarm('almaimoon')">🌿 Almaimoon Farm</button>
    <button class="farm-tab" onclick="switchFarm('charity')">❤️ Wusha Charity Farm</button>
    <button class="farm-tab" onclick="switchFarm('wadi')">🏞️ Wadi Sfai Farm</button>
    <button class="farm-tab" onclick="switchFarm('almudinah')">🕌 Almudinah Farm</button>
    <button class="farm-tab" onclick="switchFarm('alzubair')">🌾 Alzubair Farm</button>
  </div>

  <nav id="main-nav"></nav>
  <main id="main-content"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeLightbox()">
  <button onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script>
// ====================== FIREBASE ======================
const firebaseConfig = {
  apiKey: "AIzaSyB98c_l-goNvGCG2Dobl42ZrSvhkt-cGMI",
  authDomain: "farm-followup.firebaseapp.com",
  databaseURL: "https://farm-followup-default-rtdb.firebaseio.com",
  projectId: "farm-followup",
  storageBucket: "farm-followup.firebasestorage.app",
  messagingSenderId: "579853148504",
  appId: "1:579853148504:web:76306d44f7f874382b852d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Local in-memory cache — synced from Firebase on login
const farmCache = {};

async function loadAllFarmsFromDB() {
  const snap = await db.ref('farms').once('value');
  const data = snap.val() || {};
  Object.keys(FARMS).forEach(fid => {
    farmCache[fid] = data[fid] || { tasks:[], reports:[], visits:[], issues:[], notes:[], photos:['','',''] };
    // Firebase turns arrays into objects — convert back
    ['tasks','reports','visits','issues','notes'].forEach(k => {
      if (farmCache[fid][k] && !Array.isArray(farmCache[fid][k]))
        farmCache[fid][k] = Object.values(farmCache[fid][k]);
      farmCache[fid][k] = farmCache[fid][k] || [];
    });
    if (!Array.isArray(farmCache[fid].photos)) farmCache[fid].photos = ['','',''];
  });
}

// ====================== CONSTANTS ======================
const USERS = {
  admin:      { name: 'Farm Manager',          role: 'Admin',        password: 'admin495', color: '#2d6a4f' },
  struct_eng: { name: 'Structural Engineer',   role: 'Struct. Eng.', password: 'farm495',  color: '#1d3557' },
  agro_eng:   { name: 'Agricultural Engineer', role: 'Agro. Eng.',   password: 'farm495',  color: '#6b4226' },
  soil_eng:   { name: 'Soil Engineer',         role: 'Soil Eng.',    password: 'farm495',  color: '#e07b39' },

// ====================== DATA LAYER ======================
function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getFarmData(farmId) {
  return farmCache[farmId] || { tasks:[], reports:[], visits:[], issues:[], notes:[], photos:['','',''] };
}
function saveFarmData(farmId, d) {
  farmCache[farmId] = d;
  db.ref('farms/' + farmId).set(d).catch(e => showToast('⚠️ Sync error: ' + e.message));
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d) { if(!d) return '—'; const p = d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'just now'; if (m < 60) return m+'m ago';
  if (m < 1440) return Math.floor(m/60)+'h ago'; return Math.floor(m/1440)+'d ago';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  if (!u) { showLoginError('Please select a user.'); return; }
  if (p !== USERS[u].password) { showLoginError('Wrong password.'); return; }
  const btn = document.querySelector('#login-screen button');
  btn.textContent = 'Loading…'; btn.disabled = true;
  try {
    await loadAllFarmsFromDB();
  } catch(e) { console.warn('Firebase load failed, using cache', e); }
  // Track login stats
  try {
    const ref = db.ref('loginStats/' + u);
    const snap = await ref.once('value');
    const prev = snap.val() || { count: 0 };
    await ref.set({ count: (prev.count || 0) + 1, lastLogin: new Date().toISOString() });
  } catch(e) { console.warn('Login stats error', e); }
  currentUser = u;
  save('farm_session', u);
  btn.textContent = 'Login'; btn.disabled = false;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}
function showLoginError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}
function doLogout() {
  localStorage.removeItem('farm_session');
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// auto-resume
(async function() {
  const s = load('farm_session', null);
  if (s && USERS[s]) {
    try { await loadAllFarmsFromDB(); } catch(e) { console.warn('Firebase load failed', e); }
    currentUser = s;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    initApp();
  }
})();

function switchFarm(farmId) {
  currentFarm = farmId;

  document.querySelectorAll('#farm-bar .farm-tab').forEach((btn, i) => {
    btn.classList.toggle('active', Object.keys(FARMS)[i] === farmId);
  });
  navigate('dashboard');

function navigate(page) {
  activePage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main-content');
  const isAdmin = currentUser === 'admin';
  if (page === 'dashboard')     main.innerHTML = isAdmin ? renderAdminDashboard() : currentUser==='mois_eng' ? renderMoisDashboard() : currentUser==='chetak' ? renderChetakDashboard() : renderEngDashboard();

  else if (page === 'tasks' || page === 'my-tasks') main.innerHTML = renderTasks(isAdmin ? null : currentUser);

  else if (page === 'issues')   main.innerHTML = renderIssues(isAdmin ? null : currentUser);

function triggerFarmPhoto(slot) {
  pendingPhotoSlot = slot;
  document.getElementById('farm-photo-input').click();
}

function onFarmPhotoSelected(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const d = getFarmData(currentFarm);
    if (!d.photos) d.photos = ['','',''];
    d.photos[pendingPhotoSlot] = e.target.result;
    saveFarmData(currentFarm, d);
    navigate('farm-profile');
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeFarmPhoto(slot) {
  if (!confirm('Remove this photo?')) return;
  const d = getFarmData(currentFarm);
  d.photos[slot] = '';
  saveFarmData(currentFarm, d);
  navigate('farm-profile');
}

function saveFarmInfo() {
  const d = getFarmData(currentFarm);
  d.info = {
    name: document.getElementById('fi-name').value,
    location: document.getElementById('fi-loc').value,
    area: document.getElementById('fi-area').value,
    crops: document.getElementById('fi-crops').value,
    irrigation: document.getElementById('fi-irr').value,
    established: document.getElementById('fi-est').value,
    notes: document.getElementById('fi-notes').value,
  };
  saveFarmData(currentFarm, d);
  navigate('farm-profile');
  showToast('Farm info saved!');
}

}

function togglePlantCurtain(idx) {
  const curtain = document.getElementById('plant-curtain-' + idx);
  const card = document.getElementById('plant-card-' + idx);
  const p = PLANT_DATA[idx];
  if (!curtain) return;
  const isOpen = curtain.style.display === 'block';
  // close all others first
  PLANT_DATA.forEach((_, i) => {
    const c = document.getElementById('plant-curtain-' + i);
    const ca = document.getElementById('plant-card-' + i);
    if (c) c.style.display = 'none';
    if (ca) ca.style.borderColor = 'transparent';
  });
  if (!isOpen) {
    curtain.style.display = 'block';
    card.style.borderColor = p.color;
    curtain.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function phNeedBadge(text) {
  if (!text) return '—';
  const t = text.toLowerCase();
  let color = '#2d6a4f', bg = '#d8f3dc';
  if (t.includes('very high')) { color='#d62828'; bg='#fde8e8'; }
  else if (t.includes('high')) { color='#c05c00'; bg='#ffe8cc'; }
  else if (t.includes('moderate')) { color='#1d3557'; bg='#dbeafe'; }
  else if (t.includes('low')) { color='#2d6a4f'; bg='#d8f3dc'; }
  const shortText = text.replace('(young) / Moderate (mature)','*').replace('(early)','').replace('(fruiting)','').replace('(veg.) / Reduce (fruiting)','*').replace('(key micronutrient)','').replace('once established','').trim();
  return `<span style="background:${bg};color:${color};padding:2px 7px;border-radius:10px;font-weight:700;font-size:11px;white-space:nowrap">${shortText}</span>`;
}

function renderAdminDashboard() {

function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q)?'':'none';
  });
}
function filterByText(tableId, q) {
  if (!q) return;
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    row.style.display = row.textContent.includes(q)?'':'none';
  });
}

        <input type="file" id="task-photo-input" accept="image/*" onchange="addTaskPhoto(event)" />
        <div class="upload-icon">📷</div>
        <p>Click to upload a photo</p>
        <p style="font-size:11px;margin-top:3px">Max 3 photos · JPG, PNG</p>
      </div>
      <div class="task-photo-preview" id="task-photo-preview">
        ${(pendingTaskPhotos||[]).map((ph,i)=>ph?photoPreviewItem(ph,i):'').join('')}
      </div>
    </div>`;
}

function photoPreviewItem(src, idx) {
  return `<div class="preview-item" id="tprev-${idx}">
    <img src="${src}" onclick="openLightboxSrc('${src}')" />
    <button class="remove-photo" onclick="removeTaskPhoto(${idx})">✕</button>
  </div>`;
}

function addTaskPhoto(event) {
  const file = event.target.files[0]; if (!file) return;
  if (pendingTaskPhotos.length >= 3) { alert('Maximum 3 photos per task'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const idx = pendingTaskPhotos.length;
    pendingTaskPhotos.push(e.target.result);
    const prev = document.getElementById('task-photo-preview');
    if (prev) prev.insertAdjacentHTML('beforeend', photoPreviewItem(e.target.result, idx));
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function removeTaskPhoto(idx) {
  pendingTaskPhotos[idx] = '';
  const el = document.getElementById('tprev-'+idx);
  if (el) el.remove();
}

function saveTask(id) {
  const d = getFarmData(currentFarm);
  const title = document.getElementById('t-title').value.trim();
  if (!title) { alert('Title is required'); return; }
  const existing = id ? d.tasks.find(t=>t.id===id) : null;
  const task = {
    id: id||uid(), title,
    assignee: document.getElementById('t-assignee').value,
    status: document.getElementById('t-status').value,
    priority: document.getElementById('t-priority').value,
    dueDate: document.getElementById('t-due').value,
    category: document.getElementById('t-cat').value,
    description: document.getElementById('t-desc').value,
    progressNotes: document.getElementById('t-progress').value,
    photos: pendingTaskPhotos.filter(Boolean),
    farm: currentFarm,
    createdAt: existing?.createdAt||new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  if (id) { const i=d.tasks.findIndex(t=>t.id===id); if(i>-1) d.tasks[i]=task; }
  else d.tasks.push(task);
  saveFarmData(currentFarm, d);
  closeModal();
  navigate(currentUser==='admin'?'tasks':'my-tasks');
}

}
function saveNote() {
  const d=getFarmData(currentFarm);
  const title=document.getElementById('n-title').value.trim();
  const content=document.getElementById('n-content').value.trim();
  if(!title||!content){alert('Title and content required');return;}
  d.notes.push({id:uid(),title,content,tag:document.getElementById('n-tag').value,author:currentUser,createdAt:new Date().toISOString()});

}

const COST_FIELDS = [
  { id: 'labor',       label: 'Labor Charges',           icon: '👷', color: '#1d3557', owners: ['admin','struct_eng'] },
  { id: 'seeds',       label: 'Seeds',                   icon: '🌱', color: '#2d6a4f', owners: ['admin','agro_eng'] },
  { id: 'pesticides',  label: 'Pesticides',              icon: '🧪', color: '#8b2252', owners: ['admin','agro_eng'] },
  { id: 'nutrition',   label: 'Nutrition / Fertilizers', icon: '🌿', color: '#6b4226', owners: ['admin','agro_eng','soil_eng'] },
  { id: 'electricity', label: 'Electricity',             icon: '⚡', color: '#f4a261', owners: ['admin','mois_eng'] },
  { id: 'water',       label: 'Water',                   icon: '💧', color: '#457b9d', owners: ['admin','mois_eng','irr_eng'] },
];

function canEditField(f) { return f.owners.includes(currentUser); }
function currentMonth() { return new Date().toISOString().slice(0,7); }
function fmtMonth(m) {
  if (!m) return '—';
  const [y,mo] = m.split('-');
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return names[parseInt(mo)-1] + ' ' + y;
}
function costVal(rec, fid, type) { return parseFloat(rec?.[type+'_'+fid])||0; }
function costTotalType(rec, type) { return COST_FIELDS.reduce((s,f)=>s+costVal(rec,f.id,type),0); }
function costTotal(rec) { return costTotalType(rec,'act'); } // actual is primary total

function renderFarmCosts() {
  const d = getFarmData(currentFarm);
  d.costs = d.costs || [];

  return `

    </h2>

    <!-- CURRENT MONTH CARD -->
    ${cur ? `
    <div style="background:linear-gradient(135deg,#f0f9f0,#e8f5e8);border-radius:12px;padding:18px 20px;margin-bottom:18px;border:2px solid #d0e8d0">

        <span style="font-weight:700;font-size:15px;color:var(--green)">📅 ${fmtMonth(cur.month)} — Current Month</span>
        ${canEdit ? `<button class="btn btn-secondary btn-sm" onclick="openEditCost('${cur.id}')">✏️ Edit My Fields</button>` : ''}

        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead><tr style="background:#e8f0e8">

            <th style="padding:8px 12px;text-align:right;color:#457b9d">Estimated (AED)</th>

            <th style="padding:8px 12px;text-align:right;color:${`#c07c2a`}">Variance</th>
            <th style="padding:8px 12px;text-align:center;color:var(--gray)">Updated by</th>
          </tr></thead>
          <tbody>
            ${COST_FIELDS.map(f => {
              const est = costVal(cur, f.id, 'est');
              const act = costVal(cur, f.id, 'act');

              const updBy = cur['updby_'+f.id] ? (USERS[cur['updby_'+f.id]]?.name || cur['updby_'+f.id]) : '—';
              return `<tr style="border-bottom:1px solid #eef3ee">

                <td style="padding:9px 12px;text-align:right;color:#457b9d;font-weight:600">${est ? est.toLocaleString() : '—'}</td>
                <td style="padding:9px 12px;text-align:right;color:#2d6a4f;font-weight:700">${act ? act.toLocaleString() : '—'}</td>
                <td style="padding:9px 12px;text-align:right;font-weight:700;color:${variance>0?'#d62828':variance<0?'#2d6a4f':'#aaa'}">
                  ${est||act ? (variance>0?'▲ ':(variance<0?'▼ ':''))+Math.abs(variance).toLocaleString() : '—'}

              <td style="padding:10px 12px;text-align:right;color:${costTotalType(cur,'act')-costTotalType(cur,'est')>0?'#d62828':'#2d6a4f'}">

                  (costTotalType(cur,'act')>costTotalType(cur,'est')?'▲ ':'▼ ')+(Math.abs(costTotalType(cur,'act')-costTotalType(cur,'est'))).toLocaleString() : '—'}

          <th>Est. Total</th><th>Act. Total</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${d.costs.length===0
            ? `<tr><td colspan="${COST_FIELDS.length+4}"><div class="empty"><div class="empty-icon">💰</div>No records yet</div></td></tr>`

              <tr ${c.month===thisMonth?'style="background:#f0f9f0"':''}>
                <td><strong>${fmtMonth(c.month)}</strong>${c.month===thisMonth?' <span class="badge badge-green">Now</span>':''}</td>
                ${COST_FIELDS.map(f=>{
                  const est=costVal(c,f.id,'est'), act=costVal(c,f.id,'act');
                  return `<td style="text-align:center;font-size:12px">
                    <span style="color:#457b9d">${est||'—'}</span>
                    <span style="color:#ccc"> / </span>
                    <span style="color:#2d6a4f;font-weight:600">${act||'—'}</span>
                  </td>`;
                }).join('')}
                <td style="text-align:right;color:#457b9d;font-weight:600">${costTotalType(c,'est').toLocaleString()}</td>
                <td style="text-align:right;color:#2d6a4f;font-weight:700">${costTotalType(c,'act').toLocaleString()}</td>
                <td style="white-space:nowrap">
                  ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="openEditCost('${c.id}')">Edit</button>`:''}
                  ${isAdmin?`<button class="btn btn-danger btn-sm" onclick="deleteCost('${c.id}')">Del</button>`:''}
                </td>
              </tr>`).join('')}
        </tbody>
        ${d.costs.length>0?`<tfoot><tr style="background:#f0f7f0;font-weight:700">
          <td>ALL TIME</td>
          ${COST_FIELDS.map(f=>`<td style="text-align:center;font-size:12px">
            <span style="color:#457b9d">${d.costs.reduce((s,c)=>s+costVal(c,f.id,'est'),0).toLocaleString()}</span>
            <span style="color:#ccc"> / </span>
            <span style="color:#2d6a4f">${d.costs.reduce((s,c)=>s+costVal(c,f.id,'act'),0).toLocaleString()}</span>
          </td>`).join('')}
          <td style="color:#457b9d">${d.costs.reduce((s,c)=>s+costTotalType(c,'est'),0).toLocaleString()}</td>
          <td style="color:#2d6a4f">${d.costs.reduce((s,c)=>s+costTotalType(c,'act'),0).toLocaleString()}</td>
          <td></td>
        </tr></tfoot>`:''}
      </table>
    </div>
  </div>`;
}

  return `

function updateCostPreview() {
  const myFields = COST_FIELDS.filter(f => canEditField(f));
  const est = myFields.reduce((s,f)=>s+(parseFloat(document.getElementById('cf-est-'+f.id)?.value)||0),0);
  const act = myFields.reduce((s,f)=>s+(parseFloat(document.getElementById('cf-act-'+f.id)?.value)||0),0);
  const pe = document.getElementById('prev-est'), pa = document.getElementById('prev-act');
  if (pe) pe.textContent = est.toLocaleString();
  if (pa) pa.textContent = act.toLocaleString();
}

function openAddCost() {
  openModal('Add Monthly Costs — ' + FARMS[currentFarm].name, costFormHTML(null),
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveCost()">Save</button>`);
}

function openEditCost(id) {
  const d = getFarmData(currentFarm);
  const rec = d.costs.find(x=>x.id===id); if(!rec) return;
  openModal('Edit Costs — ' + fmtMonth(rec.month) + ' — ' + FARMS[currentFarm].name, costFormHTML(rec),
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveCost('${id}')">Update</button>`);
  setTimeout(updateCostPreview, 80);
}

function saveCost(id) {
  const d = getFarmData(currentFarm);
  d.costs = d.costs || [];
  const month = document.getElementById('cf-month').value;
  if (!month) { alert('Month is required'); return; }
  if (!id && d.costs.find(c=>c.month===month)) {
    // Month exists — edit it instead
    id = d.costs.find(c=>c.month===month).id;
  }
  let rec = id ? { ...d.costs.find(x=>x.id===id) } : { id: uid(), month, createdAt: new Date().toISOString() };
  if (!rec.id) rec = { id: uid(), month, createdAt: new Date().toISOString() };
  // only overwrite fields this user owns
  COST_FIELDS.filter(f=>canEditField(f)).forEach(f => {
    rec['est_'+f.id] = document.getElementById('cf-est-'+f.id)?.value || '';
    rec['act_'+f.id] = document.getElementById('cf-act-'+f.id)?.value || '';
    rec['updby_'+f.id] = currentUser;
  });
  const notesEl = document.getElementById('cf-notes');
  if (notesEl) rec.notes = notesEl.value;
  rec.updatedAt = new Date().toISOString();
  if (id) { const i=d.costs.findIndex(x=>x.id===id); if(i>-1) d.costs[i]=rec; else d.costs.push(rec); }
  else d.costs.push(rec);
  saveFarmData(currentFarm, d);
  closeModal(); navigate('farm-costs');
  showToast('✅ Cost record saved for ' + fmtMonth(month));
}

function deleteCost(id) {
  if (!confirm('Delete this cost record?')) return;
  const d = getFarmData(currentFarm);
  d.costs = d.costs.filter(x=>x.id!==id);
  saveFarmData(currentFarm, d); navigate('farm-costs');
}

function phColor(ph) {
  const v = parseFloat(ph);
  if (!v) return '#aaa';
  if (v < 5.5) return '#d62828';
  if (v < 6.0) return '#e07b39';
  if (v <= 7.5) return '#2d6a4f';
  if (v <= 8.5) return '#457b9d';
  return '#8b2252';
}

  const weekNum = Math.ceil((new Date() - new Date(new Date().getFullYear(),0,1)) / 604800000);
  openModal('New Soil Test Record', `

      <div class="form-group"><label>Test Date</label><input id="st-date" type="date" value="${today()}" /></div>

    <div class="form-row">

      </div>
    </div>
    <div class="form-row three">
      <div class="form-group"><label>pH Value</label><input id="st-ph" type="number" step="0.1" min="3" max="10" placeholder="e.g. 7.2" /></div>

let pendingPhHealthPhotos = [null, null, null];

      return `
      <div style="background:#f8fdf8;border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid #d0e8d0">
        <div style="font-size:12px;font-weight:700;color:var(--green);margin-bottom:8px">Disease #${i+1}</div>
        <div class="form-row">
          <div class="form-group"><label>Disease / Sickness Name</label><input id="ph-s${i}-name" value="${esc(s.name||'')}" placeholder="e.g. Powdery Mildew" /></div>
          <div class="form-group"><label>Affected Area %</label><input id="ph-s${i}-pct" type="number" min="0" max="100" value="${s.pct||''}" placeholder="%" /></div>
        </div>
        <div class="form-row one">
          <div class="form-group"><label>Description / Symptoms</label><textarea id="ph-s${i}-desc" style="min-height:55px" placeholder="Describe symptoms...">${esc(s.desc||'')}</textarea></div>
        </div>
        <div class="form-group"><label>📷 Photo</label>
          <div class="task-photo-upload" onclick="document.getElementById('phph-input-${i}').click()" style="padding:10px">
            <input type="file" id="phph-input-${i}" accept="image/*" onchange="setPlantHealthPhoto(event,${i})" />
            <div style="font-size:11px;color:var(--gray)">📷 ${s.photo?'Photo uploaded — click to change':'Click to add photo'}</div>
          </div>
          ${s.photo||pendingPhHealthPhotos[i] ? `<div style="margin-top:6px"><img src="${s.photo||pendingPhHealthPhotos[i]}" style="width:70px;height:70px;object-fit:cover;border-radius:7px;border:2px solid #d0e8d0;cursor:pointer" onclick="openLightboxSrc('${s.photo||pendingPhHealthPhotos[i]}')" /></div>` : ''}

        </div>
      </div>`;
    }).join('')}
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="savePlantHealth('${existingId||''}')">Save Record</button>`);
}
function openEditPlantHealth(id) { openAddPlantHealth(id); }

function setPlantHealthPhoto(event, idx) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingPhHealthPhotos[idx] = e.target.result;
    const prev = document.getElementById('phph-prev-' + idx);
    if (prev) prev.innerHTML = `<img src="${e.target.result}" style="width:70px;height:70px;object-fit:cover;border-radius:7px;border:2px solid #d0e8d0;margin-top:6px;cursor:pointer" onclick="openLightboxSrc('${e.target.result}')" />`;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function savePlantHealth(id) {
  const d = getFarmData(currentFarm);
  d.plantHealth = d.plantHealth || [];
  const title = document.getElementById('ph-title').value.trim();
  if (!title) { alert('Title is required'); return; }
  const sicknesses = [0,1,2].map(i => ({
    name: document.getElementById(`ph-s${i}-name`).value.trim(),
    pct: document.getElementById(`ph-s${i}-pct`).value,
    desc: document.getElementById(`ph-s${i}-desc`).value.trim(),
    photo: pendingPhHealthPhotos[i] || '',
  })).filter(s => s.name);
  const rec = {
    id: id||uid(), title,
    recordDate: document.getElementById('ph-date').value,
    plantType: document.getElementById('ph-plant').value,
    location: document.getElementById('ph-loc').value,
    severity: document.getElementById('ph-sev').value,
    treatment: document.getElementById('ph-treat').value,
    sicknesses, author: currentUser,
    createdAt: (id ? d.plantHealth.find(x=>x.id===id)?.createdAt : null) || new Date().toISOString(),
  };
  if (id) { const i=d.plantHealth.findIndex(x=>x.id===id); if(i>-1) d.plantHealth[i]=rec; }
  else d.plantHealth.push(rec);
  saveFarmData(currentFarm, d); closeModal(); navigate('plant-health');
}

function deletePlantHealth(id) {
  if (!confirm('Delete this record?')) return;
  const d = getFarmData(currentFarm);
  d.plantHealth = d.plantHealth.filter(x=>x.id!==id);
  saveFarmData(currentFarm, d); navigate('plant-health');
}

let jobMatCount = 1;
function addJobMatRow() {
  const tbody = document.getElementById('job-mats-body');
  if (!tbody) return;
  const idx = Date.now();
  tbody.insertAdjacentHTML('beforeend', jobMatRow(idx));
}
function removeJobMatRow(idx) {
  const row = document.getElementById('jmat-row-' + idx);
  if (row) row.remove();
}

function collectJobMaterials() {
  const rows = document.querySelectorAll('#job-mats-body tr');
  const mats = [];
  rows.forEach(row => {
    const idx = row.id.replace('jmat-row-','');
    const name = document.getElementById('jmat-name-'+idx)?.value.trim();
    if (!name) return;
    mats.push({
      name,
      category: document.getElementById('jmat-cat-'+idx)?.value || 'Other',
      qty: parseFloat(document.getElementById('jmat-qty-'+idx)?.value) || 0,
      unit: document.getElementById('jmat-unit-'+idx)?.value || 'pcs',
      unitCost: document.getElementById('jmat-cost-'+idx)?.value || '',
    });
  });
  return mats;
}

function pushMatsToInventory(mats) {
  if (!mats || mats.length === 0) return 0;
  const d = getFarmData(currentFarm);
  d.storeItems = d.storeItems || [];
  let added = 0, updated = 0;
  mats.forEach(m => {
    if (!m.qty || m.qty <= 0) return;
    // find existing item by name (case-insensitive)
    const existing = d.storeItems.find(s => s.name.trim().toLowerCase() === m.name.toLowerCase());
    if (existing) {
      existing.qtyIn = (parseFloat(existing.qtyIn) || 0) + m.qty;
      existing.balance = Math.max(0, (parseFloat(existing.qtyIn)||0) - (parseFloat(existing.qtyOut)||0));
      if (m.unitCost) existing.unitCost = m.unitCost;
      updated++;
    } else {
      d.storeItems.push({
        id: uid(), name: m.name, brand: '',
        category: m.category, unit: m.unit,
        qtyIn: m.qty, qtyOut: 0, balance: m.qty,
        minQty: 0, storeLoc: '', unitCost: m.unitCost,
        author: currentUser, createdAt: new Date().toISOString(),
      });
      added++;
    }
  });
  saveFarmData(currentFarm, d);
  return { added, updated };
}

    </div>
    <div class="form-row">
      <div class="form-group"><label>Store Location</label><input id="si-loc" value="${esc(s?.storeLoc||'')}" placeholder="e.g. Shelf A2" /></div>
      <div class="form-group"><label>Unit Cost (AED)</label><input id="si-cost" type="number" step="0.01" value="${s?.unitCost||''}" /></div>
    </div>`;
}

function openAddStoreItem() {
  openModal('Add Store Item', storeItemFormHTML(null),
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveStoreItem()">Save</button>`);
}
function openEditStoreItem(id) {
  const d=getFarmData(currentFarm); const s=d.storeItems.find(x=>x.id===id); if(!s) return;
  openModal('Edit Store Item', storeItemFormHTML(s),
    `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
     <button class="btn btn-primary" onclick="saveStoreItem('${id}')">Update</button>`);
}
function saveStoreItem(id) {
  const d=getFarmData(currentFarm); d.storeItems=d.storeItems||[];
  const name=document.getElementById('si-name').value.trim();
  if(!name){alert('Item name required');return;}
  const qin=parseFloat(document.getElementById('si-qin').value)||0;
  const qout=parseFloat(document.getElementById('si-qout').value)||0;
  const rec={
    id:id||uid(), name, brand:document.getElementById('si-brand').value,
    category:document.getElementById('si-cat').value,
    unit:document.getElementById('si-unit').value,
    qtyIn:qin, qtyOut:qout, balance:Math.max(0,qin-qout),
    minQty:document.getElementById('si-min').value,
    storeLoc:document.getElementById('si-loc').value,
    unitCost:document.getElementById('si-cost').value,
    author:currentUser,
    createdAt:(id?d.storeItems.find(x=>x.id===id)?.createdAt:null)||new Date().toISOString(),
  };
  if(id){const i=d.storeItems.findIndex(x=>x.id===id);if(i>-1)d.storeItems[i]=rec;}
  else d.storeItems.push(rec);
  saveFarmData(currentFarm,d); closeModal(); navigate('store');
}
function openStockMovement(id) {
  const d=getFarmData(currentFarm); const s=d.storeItems.find(x=>x.id===id); if(!s) return;
  openModal(`Stock Movement — ${s.name}`, `
    <p style="margin-bottom:14px;color:var(--gray);font-size:13px">Current balance: <strong style="font-size:16px;color:var(--green)">${s.balance} ${s.unit}</strong></p>
    <div class="form-row">
      <div class="form-group"><label>Movement Type</label>
        <select id="mv-type"><option value="in">➕ Stock In (received)</option><option value="out">➖ Stock Out (used/issued)</option></select>
      </div>
      <div class="form-group"><label>Quantity</label><input id="mv-qty" type="number" min="0.01" step="0.01" placeholder="Enter quantity" /></div>
    </div>
    <div class="form-row one"><div class="form-group"><label>Reason / Reference</label>
      <input id="mv-reason" placeholder="e.g. Issued for Job #5 / Received from supplier" />
    </div></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="applyStockMovement('${id}')">Apply</button>`);
}
function applyStockMovement(id) {
  const d=getFarmData(currentFarm); const s=d.storeItems.find(x=>x.id===id); if(!s) return;
  const type=document.getElementById('mv-type').value;
  const qty=parseFloat(document.getElementById('mv-qty').value);
  if(!qty||qty<=0){alert('Enter a valid quantity');return;}
  if(type==='in'){s.qtyIn=(parseFloat(s.qtyIn)||0)+qty;}
  else{s.qtyOut=(parseFloat(s.qtyOut)||0)+qty;}
  s.balance=Math.max(0,(parseFloat(s.qtyIn)||0)-(parseFloat(s.qtyOut)||0));
  saveFarmData(currentFarm,d); closeModal(); navigate('store');
  showToast(type==='in'?`+${qty} ${s.unit} added to stock`:`-${qty} ${s.unit} removed from stock`);
}
function deleteStoreItem(id) {
  if(!confirm('Delete this store item?')) return;
  const d=getFarmData(currentFarm); d.storeItems=d.storeItems.filter(x=>x.id!==id);
  saveFarmData(currentFarm,d); navigate('store');
}

// ====================== WEATHER ======================
// Al Dhaid, Sharjah coordinates
const WEATHER_LAT = 25.2878;
const WEATHER_LON = 55.8890;
const WMO_CODES = {
  0:'Clear sky', 1:'Mainly clear', 2:'Partly cloudy', 3:'Overcast',
  45:'Foggy', 48:'Icy fog', 51:'Light drizzle', 53:'Drizzle', 55:'Heavy drizzle',
  61:'Light rain', 63:'Rain', 65:'Heavy rain', 71:'Light snow', 73:'Snow', 75:'Heavy snow',
  77:'Snow grains', 80:'Light showers', 81:'Showers', 82:'Heavy showers',
  85:'Snow showers', 86:'Heavy snow showers', 95:'Thunderstorm',
  96:'Thunderstorm + hail', 99:'Thunderstorm + heavy hail',
};
const WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌧️', 55:'🌧️', 61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'❄️', 73:'❄️', 75:'❄️', 77:'🌨️', 80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️', 99:'⛈️',
};

function heatIndexClass(t) {
  if (t >= 45) return 'heat-extreme';
  if (t >= 38) return 'heat-very-hot';
  if (t >= 32) return 'heat-hot';
  if (t >= 26) return 'heat-warm';
  return '';
}

async function fetchWeather() {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_LAT}&longitude=${WEATHER_LON}` +
    `&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m` +
    `&daily=weather_code,temperature_2m_max,temperature_2m_min` +
    `&wind_speed_unit=kmh&timezone=Asia%2FDubai&forecast_days=4`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const c = data.current;
    const temp = Math.round(c.temperature_2m);
    const feels = Math.round(c.apparent_temperature);
    const hum = Math.round(c.relative_humidity_2m);
    const wind = Math.round(c.wind_speed_10m);
    const code = c.weather_code;
    const icon = WMO_ICONS[code] || '🌡️';
    const cond = WMO_CODES[code] || 'Unknown';
    const now = new Date().toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
    const heatCls = heatIndexClass(temp);

    document.getElementById('weather-content').outerHTML = `
      <div class="w-item" id="weather-content">
        <span class="w-icon">${icon}</span>
        <span class="w-val ${heatCls}">${temp}°C</span>
        <span class="w-unit">/ Feels ${feels}°C</span>
      </div>
      <div class="w-divider"></div>
      <div class="w-item">
        <span class="w-icon">💧</span>
        <span class="w-val">${hum}%</span>
        <span class="w-label">Humidity</span>
      </div>
      <div class="w-divider"></div>
      <div class="w-item">
        <span class="w-icon">💨</span>
        <span class="w-val">${wind}</span>
        <span class="w-unit">km/h</span>
      </div>
      <div class="w-divider"></div>
      <span class="w-condition">${cond}</span>
      <span class="w-updated">Updated ${now}</span>`;

    // 3-day forecast (skip today = index 0, show next 3)
    const days = data.daily;
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    let forecastHtml = '';
    for (let i = 1; i <= 3; i++) {
      const date = new Date(days.time[i]);
      const dayLabel = dayNames[date.getDay()];
      const hi = Math.round(days.temperature_2m_max[i]);
      const lo = Math.round(days.temperature_2m_min[i]);
      const dIcon = WMO_ICONS[days.weather_code[i]] || '🌡️';
      forecastHtml += `<div class="w-day">
        <span class="w-day-label">${dayLabel}</span>
        <span>${dIcon}</span>
        <span class="w-day-temp">${hi}°</span>
        <span class="w-day-range">/ ${lo}°</span>
      </div>`;
    }
    document.getElementById('weather-forecast').innerHTML = forecastHtml;

  } catch(e) {
    const el = document.getElementById('weather-content');
    if (el) el.outerHTML = `<span class="w-error" id="weather-content">⚠️ Weather unavailable — check connection</span>`;
  }
}

// fetch immediately, then refresh every 10 minutes
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

// ====================== MODAL ======================
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOverlay(e) {
  if (e.target===document.getElementById('modal-overlay')) closeModal();
}
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });
</script>
