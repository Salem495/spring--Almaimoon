<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farm Follow-Up System - Almaimoon</title>
<style>
  :root {
    --green: #2d6a4f;
    --green-light: #40916c;
    --green-pale: #d8f3dc;
    --brown: #6b4226;
    --gold: #e9c46a;
    --red: #d62828;
    --blue: #1d3557;
    --sky: #457b9d;
    --orange: #e07b39;
    --gray: #6c757d;
    --bg: #f4f7f4;
    --white: #ffffff;
    --shadow: 0 2px 12px rgba(0,0,0,0.10);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: #222; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #2d6a4f 0%, #40916c 50%, #d8f3dc 100%);
  }
  .login-card {
    background: var(--white); border-radius: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    padding: 40px 36px; width: 360px; text-align: center;
  }
  .login-card .logo { font-size: 52px; margin-bottom: 8px; }
  .login-card h1 { color: var(--green); font-size: 22px; margin-bottom: 4px; }
  .login-card p { color: var(--gray); font-size: 13px; margin-bottom: 24px; }
  .login-card select, .login-card input {
    width: 100%; padding: 11px 14px; border-radius: 8px;
    border: 1.5px solid #cde; font-size: 15px; margin-bottom: 14px;
    outline: none; transition: border .2s;
  }
  .login-card select:focus, .login-card input:focus { border-color: var(--green-light); }
  .login-card button {
    width: 100%; padding: 12px; background: var(--green); color: #fff;
    border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  .login-card button:hover { background: var(--green-light); }
  .login-error { color: var(--red); font-size: 13px; margin-top: 6px; display: none; }

  /* APP SHELL */
  #app { display: none; min-height: 100vh; flex-direction: column; }
  header {
    background: var(--green); color: #fff;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px; height: 60px; box-shadow: var(--shadow); position: sticky; top:0; z-index:100;
  }
  header .brand { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  header .user-info { display: flex; align-items: center; gap: 14px; font-size: 14px; }
  header .role-badge {
    background: rgba(255,255,255,0.22); padding: 3px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  header button.logout {
    background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.4);
    color: #fff; padding: 5px 14px; border-radius: 7px; cursor: pointer; font-size: 13px;
    transition: background .2s;
  }
  header button.logout:hover { background: rgba(255,255,255,0.28); }

  nav {
    background: var(--white); border-bottom: 1.5px solid #e0ead8;
    display: flex; gap: 0; padding: 0 16px; overflow-x: auto;
  }
  nav button {
    background: none; border: none; padding: 14px 20px; font-size: 14px; cursor: pointer;
    color: var(--gray); border-bottom: 3px solid transparent; white-space: nowrap;
    transition: color .15s, border-color .15s; font-weight: 500;
  }
  nav button.active { color: var(--green); border-bottom-color: var(--green); font-weight: 700; }
  nav button:hover { color: var(--green-light); }

  main { flex: 1; padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }

  /* CARDS & GRID */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px,1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--white); border-radius: var(--radius); padding: 20px 18px;
    box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 6px;
  }
  .stat-card .icon { font-size: 28px; }
  .stat-card .label { font-size: 12px; color: var(--gray); text-transform: uppercase; letter-spacing: .5px; }
  .stat-card .value { font-size: 28px; font-weight: 700; }
  .stat-card.green .value { color: var(--green); }
  .stat-card.orange .value { color: var(--orange); }
  .stat-card.blue .value { color: var(--sky); }
  .stat-card.red .value { color: var(--red); }

  .card {
    background: var(--white); border-radius: var(--radius); padding: 22px;
    box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .card h2 { font-size: 16px; font-weight: 700; color: var(--green); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }

  /* FORMS */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
  .form-row.three { grid-template-columns: 1fr 1fr 1fr; }
  .form-row.one { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 13px; font-weight: 600; color: #444; }
  .form-group input, .form-group select, .form-group textarea {
    padding: 9px 12px; border-radius: 7px; border: 1.5px solid #d0ddd0;
    font-size: 14px; outline: none; transition: border .2s; font-family: inherit;
  }
  .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green-light); }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .btn { padding: 9px 22px; border-radius: 7px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary { background: var(--green); color: #fff; }
  .btn-primary:hover { background: var(--green-light); }
  .btn-secondary { background: #e8f0e8; color: var(--green); }
  .btn-secondary:hover { background: #d0e4d0; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #b52020; }
  .btn-sm { padding: 5px 13px; font-size: 12px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  th { background: #f0f7f0; color: var(--green); font-weight: 700; padding: 10px 12px; text-align: left; border-bottom: 2px solid #d0e8d0; }
  td { padding: 10px 12px; border-bottom: 1px solid #eef3ee; vertical-align: middle; }
  tr:hover td { background: #f8fdf8; }

  /* BADGES */
  .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .badge-green { background: #d8f3dc; color: var(--green); }
  .badge-orange { background: #ffe8cc; color: #b85c00; }
  .badge-red { background: #fde8e8; color: var(--red); }
  .badge-blue { background: #dbeafe; color: var(--blue); }
  .badge-gray { background: #e9ecef; color: var(--gray); }

  /* PRIORITY COLORS */
  .priority-high { color: var(--red); font-weight: 700; }
  .priority-medium { color: var(--orange); font-weight: 700; }
  .priority-low { color: var(--green); font-weight: 700; }

  /* TABS inside page */
  .inner-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
  .inner-tab { padding: 7px 18px; border-radius: 20px; border: 1.5px solid #cde; background: #fff; font-size: 13px; cursor: pointer; font-weight: 500; color: var(--gray); transition: .15s; }
  .inner-tab.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* SECTION HIDDEN */
  .page { display: none; }
  .page.active { display: block; }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 999; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff; border-radius: 14px; padding: 28px; width: 500px; max-width: 95vw;
    max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.22);
  }
  .modal h3 { font-size: 16px; color: var(--green); margin-bottom: 18px; }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

  /* TIMELINE */
  .timeline { list-style: none; padding: 0; }
  .timeline li { display: flex; gap: 14px; margin-bottom: 16px; }
  .timeline .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--green); flex-shrink: 0; margin-top: 4px; }
  .timeline .dot.orange { background: var(--orange); }
  .timeline .dot.red { background: var(--red); }
  .timeline .dot.blue { background: var(--sky); }
  .timeline .content { flex: 1; }
  .timeline .content .tl-title { font-weight: 600; font-size: 14px; }
  .timeline .content .tl-meta { font-size: 12px; color: var(--gray); margin-top: 2px; }
  .timeline .content .tl-body { font-size: 13px; color: #444; margin-top: 4px; line-height: 1.5; }

  /* ALERTS */
  .alert { padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 14px; }
  .alert-info { background: #dbeafe; color: var(--blue); }
  .alert-success { background: #d8f3dc; color: var(--green); }
  .alert-warn { background: #fff3cd; color: #856404; }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 40px 20px; color: var(--gray); }
  .empty .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* SEARCH */
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; }
  .search-bar input { flex: 1; padding: 9px 14px; border-radius: 8px; border: 1.5px solid #d0ddd0; font-size: 14px; outline: none; }
  .search-bar input:focus { border-color: var(--green-light); }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    .form-row { grid-template-columns: 1fr; }
    .form-row.three { grid-template-columns: 1fr; }
    main { padding: 14px; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }

  /* PRINT */
  @media print {
    header, nav, .btn, .search-bar { display: none !important; }
    main { padding: 0; max-width: 100%; }
    .card { box-shadow: none; border: 1px solid #ccc; }
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">🌾</div>
    <h1>Farm Follow-Up System</h1>
    <p>Almaimoon Agricultural Management</p>
    <select id="login-user">
      <option value="">— Select User —</option>
      <option value="admin">Admin (Farm Manager)</option>
      <option value="struct_eng">Structural Engineer</option>
      <option value="agro_eng">Agricultural Engineer</option>
      <option value="soil_eng">Soil Engineer</option>
    </select>
    <input type="password" id="login-pass" placeholder="Password" />
    <button onclick="doLogin()">Login</button>
    <div class="login-error" id="login-error">Invalid credentials. Try again.</div>
    <p style="margin-top:18px;font-size:11px;color:#aaa;">Demo passwords: admin123 / eng123</p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;">
  <header>
    <div class="brand">🌾 <span>Farm Follow-Up — Almaimoon</span></div>
    <div class="user-info">
      <span id="header-name"></span>
      <span class="role-badge" id="header-role"></span>
      <button class="logout" onclick="doLogout()">Logout</button>
    </div>
  </header>
  <nav id="main-nav"></nav>
  <main id="main-content"></main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
// ====================== DATA LAYER ======================
const USERS = {
  admin:      { name: 'Farm Manager', role: 'Admin', password: 'admin123', color: '#2d6a4f' },
  struct_eng: { name: 'Structural Engineer', role: 'Struct. Eng.', password: 'eng123', color: '#1d3557' },
  agro_eng:   { name: 'Agricultural Engineer', role: 'Agro. Eng.', password: 'eng123', color: '#6b4226' },
  soil_eng:   { name: 'Soil Engineer', role: 'Soil Eng.', password: 'eng123', color: '#e07b39' },
};

function load(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch { return def; } }
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getData() { return load('farm_data', { tasks: [], reports: [], visits: [], issues: [], notes: [] }); }
function saveData(d) { save('farm_data', d); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmt(d) { if(!d) return '—'; const p = d.split('-'); return `${p[2]}/${p[1]}/${p[0]}`; }
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const m = Math.floor(diff/60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  if (m < 1440) return `${Math.floor(m/60)}h ago`;
  return `${Math.floor(m/1440)}d ago`;
}

let currentUser = null;

// ====================== AUTH ======================
function doLogin() {
  const u = document.getElementById('login-user').value;
  const p = document.getElementById('login-pass').value;
  if (!u || !USERS[u]) { showError('Please select a user.'); return; }
  if (p !== USERS[u].password) { showError('Wrong password.'); return; }
  currentUser = u;
  save('farm_session', u);
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}
function showError(msg) {
  const el = document.getElementById('login-error');
  el.textContent = msg; el.style.display = 'block';
}
function doLogout() {
  localStorage.removeItem('farm_session');
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pass').value = '';
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

// Auto-resume session
(function() {
  const s = load('farm_session', null);
  if (s && USERS[s]) {
    currentUser = s;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    setTimeout(initApp, 0);
  }
})();

// ====================== APP INIT ======================
const NAV_ADMIN = [
  { id: 'dashboard', label: '📊 Dashboard' },
  { id: 'tasks', label: '✅ Tasks' },
  { id: 'reports', label: '📋 Reports' },
  { id: 'visits', label: '🚜 Field Visits' },
  { id: 'issues', label: '⚠️ Issues' },
  { id: 'notes', label: '📝 Notes' },
  { id: 'team', label: '👥 Team' },
];
const NAV_ENG = [
  { id: 'dashboard', label: '📊 My Dashboard' },
  { id: 'my-tasks', label: '✅ My Tasks' },
  { id: 'reports', label: '📋 My Reports' },
  { id: 'visits', label: '🚜 Field Visits' },
  { id: 'issues', label: '⚠️ Issues' },
  { id: 'notes', label: '📝 Notes' },
];

let activePage = 'dashboard';

function initApp() {
  const u = USERS[currentUser];
  document.getElementById('header-name').textContent = u.name;
  document.getElementById('header-role').textContent = u.role;
  const nav = document.getElementById('main-nav');
  const navItems = currentUser === 'admin' ? NAV_ADMIN : NAV_ENG;
  nav.innerHTML = navItems.map(n =>
    `<button onclick="navigate('${n.id}')" id="nav-${n.id}">${n.label}</button>`
  ).join('');
  navigate('dashboard');
}

function navigate(page) {
  activePage = page;
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + page);
  if (btn) btn.classList.add('active');
  const main = document.getElementById('main-content');
  if (currentUser === 'admin') {
    if (page === 'dashboard') main.innerHTML = renderAdminDashboard();
    else if (page === 'tasks') main.innerHTML = renderTasks(null);
    else if (page === 'reports') main.innerHTML = renderReports(null);
    else if (page === 'visits') main.innerHTML = renderVisits(null);
    else if (page === 'issues') main.innerHTML = renderIssues(null);
    else if (page === 'notes') main.innerHTML = renderNotes(null);
    else if (page === 'team') main.innerHTML = renderTeam();
  } else {
    if (page === 'dashboard') main.innerHTML = renderEngDashboard();
    else if (page === 'my-tasks') main.innerHTML = renderTasks(currentUser);
    else if (page === 'reports') main.innerHTML = renderReports(currentUser);
    else if (page === 'visits') main.innerHTML = renderVisits(currentUser);
    else if (page === 'issues') main.innerHTML = renderIssues(currentUser);
    else if (page === 'notes') main.innerHTML = renderNotes(currentUser);
  }
}

// ====================== DASHBOARD: ADMIN ======================
function renderAdminDashboard() {
  const d = getData();
  const openTasks = d.tasks.filter(t => t.status !== 'Done').length;
  const done = d.tasks.filter(t => t.status === 'Done').length;
  const openIssues = d.issues.filter(i => i.status !== 'Resolved').length;
  const visits = d.visits.length;

  const recent = [...d.reports, ...d.visits, ...d.issues]
    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).slice(0,6);

  const tasksByUser = {};
  d.tasks.forEach(t => {
    if (!tasksByUser[t.assignee]) tasksByUser[t.assignee] = {total:0,done:0};
    tasksByUser[t.assignee].total++;
    if (t.status === 'Done') tasksByUser[t.assignee].done++;
  });

  return `
  <div class="stats-grid">
    <div class="stat-card green"><div class="icon">✅</div><div class="label">Open Tasks</div><div class="value">${openTasks}</div></div>
    <div class="stat-card blue"><div class="icon">🏆</div><div class="label">Completed Tasks</div><div class="value">${done}</div></div>
    <div class="stat-card red"><div class="icon">⚠️</div><div class="label">Open Issues</div><div class="value">${openIssues}</div></div>
    <div class="stat-card orange"><div class="icon">🚜</div><div class="label">Field Visits</div><div class="value">${visits}</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="card">
      <h2>👥 Team Progress</h2>
      ${Object.keys(USERS).filter(k=>k!=='admin').map(k => {
        const info = tasksByUser[k] || {total:0,done:0};
        const pct = info.total ? Math.round(info.done/info.total*100) : 0;
        return `
        <div style="margin-bottom:14px;">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
            <span style="font-size:14px;font-weight:600">${USERS[k].name}</span>
            <span style="font-size:13px;color:var(--gray)">${info.done}/${info.total} tasks</span>
          </div>
          <div style="background:#e8f0e8;border-radius:10px;height:8px;">
            <div style="background:var(--green);width:${pct}%;height:8px;border-radius:10px;transition:width .3s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="card">
      <h2>🕐 Recent Activity</h2>
      <ul class="timeline">
        ${recent.length ? recent.map(item => {
          const type = item.visitDate ? 'visit' : item.priority ? 'issue' : 'report';
          const dotClass = type==='issue' ? 'red' : type==='visit' ? 'orange' : 'blue';
          const label = type==='visit' ? '🚜 Field Visit' : type==='issue' ? '⚠️ Issue' : '📋 Report';
          return `<li><div class="dot ${dotClass}"></div><div class="content">
            <div class="tl-title">${label}: ${item.title||item.farmSection||'—'}</div>
            <div class="tl-meta">${USERS[item.author]?.name||item.author} · ${timeAgo(item.createdAt)}</div>
            ${item.notes||item.findings ? `<div class="tl-body">${(item.notes||item.findings||'').slice(0,80)}${(item.notes||item.findings||'').length>80?'…':''}</div>` : ''}
          </div></li>`;
        }).join('') : '<li><div class="empty"><div class="empty-icon">📭</div>No activity yet</div></li>'}
      </ul>
    </div>
  </div>

  <div class="card">
    <h2>⚠️ Pending Issues by Priority</h2>
    <div style="display:flex;gap:16px;flex-wrap:wrap;">
      ${['High','Medium','Low'].map(p => {
        const cnt = d.issues.filter(i=>i.priority===p&&i.status!=='Resolved').length;
        const cls = p==='High'?'badge-red':p==='Medium'?'badge-orange':'badge-green';
        return `<div style="text-align:center;padding:14px 24px;background:#f8f8f8;border-radius:10px;">
          <div style="font-size:26px;font-weight:700">${cnt}</div>
          <span class="badge ${cls}">${p} Priority</span>
        </div>`;
      }).join('')}
    </div>
  </div>
  `;
}

// ====================== DASHBOARD: ENGINEER ======================
function renderEngDashboard() {
  const d = getData();
  const myTasks = d.tasks.filter(t => t.assignee === currentUser);
  const myOpen = myTasks.filter(t => t.status !== 'Done').length;
  const myDone = myTasks.filter(t => t.status === 'Done').length;
  const myReports = d.reports.filter(r => r.author === currentUser).length;
  const myIssues = d.issues.filter(i => i.author === currentUser && i.status !== 'Resolved').length;

  const overdue = myTasks.filter(t => t.dueDate && t.dueDate < today() && t.status !== 'Done');

  return `
  <div class="stats-grid">
    <div class="stat-card orange"><div class="icon">📋</div><div class="label">Open Tasks</div><div class="value">${myOpen}</div></div>
    <div class="stat-card green"><div class="icon">✅</div><div class="label">Completed</div><div class="value">${myDone}</div></div>
    <div class="stat-card blue"><div class="icon">📄</div><div class="label">Reports Filed</div><div class="value">${myReports}</div></div>
    <div class="stat-card red"><div class="icon">⚠️</div><div class="label">Open Issues</div><div class="value">${myIssues}</div></div>
  </div>

  ${overdue.length ? `<div class="alert alert-warn">⚠️ You have <strong>${overdue.length}</strong> overdue task(s): ${overdue.map(t=>`<em>${t.title}</em>`).join(', ')}</div>` : ''}

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
    <div class="card">
      <h2>📋 My Pending Tasks</h2>
      ${myTasks.filter(t=>t.status!=='Done').length === 0

function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}
function filterTaskStatus(status) {
  navigate(currentUser === 'admin' ? 'tasks' : 'my-tasks');
  if (!status) return;
  document.querySelectorAll('#tasks-table tbody tr').forEach(row => {
    row.style.display = row.textContent.includes(status) ? '' : 'none';
  });
}

  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>

function saveTask(id) {
  const d = getData();
  const title = document.getElementById('t-title').value.trim();
  if (!title) { alert('Title is required'); return; }
  const task = {
    id: id || uid(),
    title,
    assignee: document.getElementById('t-assignee').value,
    status: document.getElementById('t-status').value,
    priority: document.getElementById('t-priority').value,
    dueDate: document.getElementById('t-due').value,
    category: document.getElementById('t-cat').value,
    description: document.getElementById('t-desc').value,
    progressNotes: document.getElementById('t-progress')?.value || '',
    createdAt: id ? (d.tasks.find(t=>t.id===id)?.createdAt || new Date().toISOString()) : new Date().toISOString(),
    updatedAt: new Date().toISOString(),
  };
  if (id) { const i = d.tasks.findIndex(t=>t.id===id); if(i>-1) d.tasks[i]=task; }
  else d.tasks.push(task);
  saveData(d);
  closeModal();
  navigate(currentUser === 'admin' ? 'tasks' : 'my-tasks');
}

function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  const d = getData(); d.tasks = d.tasks.filter(t => t.id !== id); saveData(d);
  navigate('tasks');
}

                ${currentUser==='admin'&&i.status!=='Resolved' ? `<button class="btn btn-primary btn-sm" onclick="resolveIssue('${i.id}')">Resolve</button>` : ''}
              </td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}

function filterIssueStatus(s) {
  navigate('issues');
  if (!s) return;
  document.querySelectorAll('#issues-table tbody tr').forEach(row => {
    row.style.display = row.textContent.includes(s) ? '' : 'none';
  });
}

function openAddIssue() {
  openModal('Report an Issue', `
    <div class="form-row"><div class="form-group">
      <label>Issue Title *</label><input id="i-title" placeholder="Brief description of the issue" />
    </div><div class="form-group">
      <label>Priority</label>
      <select id="i-priority"><option>High</option><option>Medium</option><option>Low</option></select>
    </div></div>
    <div class="form-row"><div class="form-group">
      <label>Category</label>
      <select id="i-cat">
        <option>Structural</option><option>Irrigation</option><option>Soil</option><option>Crop</option>
        <option>Equipment</option><option>Pest/Disease</option><option>Water</option><option>General</option>
      </select>
    </div><div class="form-group">
      <label>Location / Farm Area</label><input id="i-loc" placeholder="e.g. Block B, Pump Station" />
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Detailed Description *</label>
      <textarea id="i-desc" placeholder="Describe the issue in detail..." style="min-height:100px"></textarea>
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Suggested Solution</label>
      <textarea id="i-sol" placeholder="What do you suggest to fix this?"></textarea>
    </div></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveIssue()">Submit Issue</button>`);
}

function saveIssue(id) {
  const d = getData();
  const title = document.getElementById('i-title').value.trim();
  const desc = document.getElementById('i-desc').value.trim();
  if (!title || !desc) { alert('Title and description are required'); return; }
  const issue = {
    id: id || uid(), title,
    priority: document.getElementById('i-priority').value,
    category: document.getElementById('i-cat').value,
    location: document.getElementById('i-loc').value,
    description: desc,
    solution: document.getElementById('i-sol').value,
    status: id ? (getData().issues.find(x=>x.id===id)?.status||'Open') : 'Open',
    author: currentUser,
    createdAt: id ? (d.issues.find(x=>x.id===id)?.createdAt||new Date().toISOString()) : new Date().toISOString(),
  };
  if (id) { const idx = d.issues.findIndex(x=>x.id===id); if(idx>-1) d.issues[idx]=issue; }
  else d.issues.push(issue);
  saveData(d); closeModal(); navigate('issues');
}

function openEditIssue(id) {
  const d = getData(); const i = d.issues.find(x=>x.id===id);
  if (!i) return;
  openModal('Edit Issue', `
    <div class="form-row"><div class="form-group">
      <label>Title *</label><input id="i-title" value="${esc(i.title)}" />
    </div><div class="form-group">
      <label>Priority</label>
      <select id="i-priority">${['High','Medium','Low'].map(p=>`<option ${p===i.priority?'selected':''}>${p}</option>`).join('')}</select>
    </div></div>
    <div class="form-row"><div class="form-group">
      <label>Category</label>
      <select id="i-cat">${['Structural','Irrigation','Soil','Crop','Equipment','Pest/Disease','Water','General'].map(c=>`<option ${c===i.category?'selected':''}>${c}</option>`).join('')}</select>
    </div><div class="form-group">
      <label>Location</label><input id="i-loc" value="${esc(i.location||'')}" />
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Description *</label><textarea id="i-desc">${esc(i.description)}</textarea>
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Suggested Solution</label><textarea id="i-sol">${esc(i.solution||'')}</textarea>
    </div></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveIssue('${id}')">Update Issue</button>`);
}

function viewIssue(id) {
  const d = getData(); const i = d.issues.find(x=>x.id===id);
  if (!i) return;
  openModal('Issue Details', `
    <div style="line-height:1.7">
      <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
        <span class="priority-${i.priority?.toLowerCase()}">${i.priority} Priority</span>
        <span class="badge ${i.status==='Resolved'?'badge-green':i.status==='In Progress'?'badge-orange':'badge-red'}">${i.status}</span>
        <span class="badge badge-blue">${i.category}</span>
      </div>
      <p><strong>Reported by:</strong> ${USERS[i.author]?.name||i.author}</p>
      <p><strong>Location:</strong> ${i.location||'—'}</p>
      <p><strong>Date:</strong> ${fmt(i.createdAt?.split('T')[0])}</p>
      <hr style="margin:10px 0;border-color:#e0ead8">
      <p><strong>Description:</strong></p><p style="color:#444;margin-top:4px">${i.description}</p>
      ${i.solution?`<p style="margin-top:10px"><strong>Suggested Solution:</strong></p><p style="color:#444;margin-top:4px">${i.solution}</p>`:''}
      ${i.resolvedBy?`<p style="margin-top:10px"><strong>Resolved by:</strong> ${USERS[i.resolvedBy]?.name||i.resolvedBy}</p>`:''}
    </div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`);
}

function resolveIssue(id) {
  if (!confirm('Mark this issue as resolved?')) return;
  const d = getData(); const i = d.issues.find(x=>x.id===id);
  if (i) { i.status = 'Resolved'; i.resolvedBy = currentUser; i.resolvedAt = new Date().toISOString(); }
  saveData(d); navigate('issues');
}

// ====================== NOTES ======================
function renderNotes(filterUser) {
  const d = getData();
  let notes = filterUser ? d.notes.filter(n=>n.author===filterUser) : d.notes;

  return `
  <div class="card">
    <h2>📝 Notes & Observations
      <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="openAddNote()">+ Add Note</button>
    </h2>
    <div class="search-bar">
      <input type="text" placeholder="Search notes..." oninput="filterNotes(this.value)" />
    </div>
    <div id="notes-container" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;">
      ${notes.length === 0 ? '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📝</div>No notes yet</div>' :
      notes.sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(n => `
        <div class="note-card" style="background:#fff;border-radius:10px;padding:18px;box-shadow:var(--shadow);border-left:4px solid ${noteColor(n.tag)}" data-text="${esc((n.title+n.content).toLowerCase())}">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
            <strong style="font-size:14px">${n.title}</strong>
            <span class="badge badge-${n.tag==='Important'?'red':n.tag==='Reminder'?'orange':'blue'}">${n.tag||'Note'}</span>
          </div>
          <p style="font-size:13px;color:#555;line-height:1.5;margin-bottom:10px">${n.content.slice(0,150)}${n.content.length>150?'…':''}</p>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <small style="color:var(--gray)">${USERS[n.author]?.name||n.author} · ${timeAgo(n.createdAt)}</small>
            ${(currentUser==='admin'||n.author===currentUser) ? `<button class="btn btn-danger btn-sm" onclick="deleteNote('${n.id}')">Del</button>` : ''}
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}

function noteColor(tag) {
  return tag==='Important'?'#d62828':tag==='Reminder'?'#e07b39':tag==='Info'?'#457b9d':'#40916c';
}
function filterNotes(q) {
  document.querySelectorAll('.note-card').forEach(card => {
    card.style.display = card.dataset.text.includes(q.toLowerCase()) ? '' : 'none';
  });
}
function openAddNote() {
  openModal('Add Note', `
    <div class="form-row"><div class="form-group">
      <label>Title *</label><input id="n-title" placeholder="Note title" />
    </div><div class="form-group">
      <label>Tag</label>
      <select id="n-tag"><option>Note</option><option>Important</option><option>Reminder</option><option>Info</option></select>
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Content *</label><textarea id="n-content" placeholder="Write your note..." style="min-height:120px"></textarea>
    </div></div>
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveNote()">Save Note</button>`);
}
function saveNote() {
  const d = getData();
  const title = document.getElementById('n-title').value.trim();
  const content = document.getElementById('n-content').value.trim();
  if (!title || !content) { alert('Title and content are required'); return; }
  d.notes.push({ id: uid(), title, content, tag: document.getElementById('n-tag').value, author: currentUser, createdAt: new Date().toISOString() });
  saveData(d); closeModal(); navigate('notes');
}
function deleteNote(id) {
  if (!confirm('Delete this note?')) return;
  const d = getData(); d.notes = d.notes.filter(n=>n.id!==id); saveData(d); navigate('notes');
}

// ====================== TEAM (ADMIN ONLY) ======================
function renderTeam() {
  const d = getData();
  return `
  <div class="stats-grid">
    ${Object.keys(USERS).filter(k=>k!=='admin').map(k => {
      const u = USERS[k];
      const myTasks = d.tasks.filter(t=>t.assignee===k);
      const done = myTasks.filter(t=>t.status==='Done').length;
      const open = myTasks.filter(t=>t.status!=='Done').length;
      const reports = d.reports.filter(r=>r.author===k).length;
      const visits = d.visits.filter(v=>v.author===k).length;
      const pct = myTasks.length ? Math.round(done/myTasks.length*100) : 0;
      return `
      <div class="card" style="margin-bottom:0">
        <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
          <div style="width:48px;height:48px;border-radius:50%;background:${u.color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700">
            ${u.name[0]}
          </div>
          <div>
            <div style="font-weight:700;font-size:16px">${u.name}</div>
            <div style="font-size:13px;color:var(--gray)">${u.role}</div>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          <div style="text-align:center;background:#f8fdf8;padding:12px;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:var(--orange)">${open}</div>
            <div style="font-size:12px;color:var(--gray)">Open Tasks</div>
          </div>
          <div style="text-align:center;background:#f8fdf8;padding:12px;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:var(--green)">${done}</div>
            <div style="font-size:12px;color:var(--gray)">Completed</div>
          </div>
          <div style="text-align:center;background:#f8fdf8;padding:12px;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:var(--sky)">${reports}</div>
            <div style="font-size:12px;color:var(--gray)">Reports</div>
          </div>
          <div style="text-align:center;background:#f8fdf8;padding:12px;border-radius:8px">
            <div style="font-size:22px;font-weight:700;color:var(--brown)">${visits}</div>
            <div style="font-size:12px;color:var(--gray)">Field Visits</div>
          </div>
        </div>
        <div style="margin-bottom:6px;display:flex;justify-content:space-between">
          <span style="font-size:13px">Task Completion</span>
          <span style="font-size:13px;font-weight:700">${pct}%</span>
        </div>
        <div style="background:#e8f0e8;border-radius:10px;height:8px">
          <div style="background:${u.color};width:${pct}%;height:8px;border-radius:10px"></div>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="openAssignTask('${k}')">+ Assign Task</button>
      </div>`;
    }).join('')}
  </div>`;
}

function openAssignTask(assignee) {
  openModal(`Assign Task to ${USERS[assignee]?.name}`, `
    <div class="form-row one"><div class="form-group">
      <label>Task Title *</label><input id="t-title" placeholder="Task title" />
    </div></div>
    <div class="form-row"><div class="form-group">
      <label>Priority</label>
      <select id="t-priority"><option>High</option><option>Medium</option><option>Low</option></select>
    </div><div class="form-group">
      <label>Due Date</label><input id="t-due" type="date" value="${today()}" />
    </div></div>
    <div class="form-row"><div class="form-group">
      <label>Category</label>
      <select id="t-cat">${['Irrigation','Construction','Planting','Soil Sampling','Equipment','Monitoring','General'].map(c=>`<option>${c}</option>`).join('')}</select>
    </div><div class="form-group">
      <label>Status</label>
      <select id="t-status"><option>Todo</option><option>In Progress</option></select>
    </div></div>
    <div class="form-row one"><div class="form-group">
      <label>Description</label><textarea id="t-desc" placeholder="Task details..."></textarea>
    </div></div>
    <input type="hidden" id="t-assignee" value="${assignee}" />
    <input type="hidden" id="t-progress" value="" />
  `, `<button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">Assign Task</button>`);
}

// ====================== MODAL UTILS ======================
function openModal(title, body, footer) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}
function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Keyboard close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
